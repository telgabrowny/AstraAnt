# Courier Ant — Surface/space operations specialist
# Handles cargo staging, return vehicle loading, surface ops. Only caste outside tunnels.

caste: courier
chassis:
  type: spider_6leg
  base_mass_g: 30          # Reinforced for vacuum/thermal exposure
  mass_budget_g: 500

compute:
  part_id: esp32_s3
  mass_g: 10
  power_draw_mw: 250
  cost_usd: 5

locomotion:
  actuators: 6
  part_id: vacuum_actuator_maxon  # Must survive surface vacuum
  per_unit_mass_g: 35
  per_unit_power_mw: 800
  per_unit_cost_usd: 150

communication:
  part_id: sx1276_lora
  mass_g: 5
  power_mw: 120
  cost_usd: 8
  range_km: 10
  bandwidth_kbps: 50
  purpose: "long-range for surface/orbit ops"

sensors:
  - part_id: bno055_imu
    mass_g: 3
    power_mw: 12
    cost_usd: 20
    purpose: "navigation / attitude determination"
  - id: sun_sensor
    type: coarse_sun_sensor
    mass_g: 5
    power_mw: 5
    cost_usd: 15
    purpose: "attitude determination on surface"
  - part_id: vl53l0x_lidar
    mass_g: 1
    power_mw: 20
    cost_usd: 4
    purpose: "proximity / collision avoidance"
  - id: radiation_dosimeter
    type: radfet_dosimeter
    mass_g: 2
    power_mw: 2
    cost_usd: 10
    purpose: "track cumulative radiation exposure for lifetime estimation"

tool:
  type: cargo_manipulator
  part_id: vacuum_actuator_maxon
  mass_g: 35
  power_mw: 800
  cost_usd: 150
  purpose: "grab and position cargo pods for return vehicle loading"

solar:
  part_id: alta_gaas_solar
  area_cm2: 50
  mass_g: 4               # ~0.08 g/cm2
  power_output_mw_at_1au: 1450
  cost_usd: 75
  notes: "Output scales with 1/r^2 from Sun"

sail:
  type: personal_stationkeeping
  part_id: cp1_polyimide_sail
  area_m2: 3
  mass_g: 30               # ~7 g/m2 film + minimal support structure
  cost_usd: 200
  purpose: "local maneuvering and station-keeping near asteroid"

thermal:
  heater_power_mw: 500
  mli_blanket_mass_g: 20
  heater_mass_g: 10
  mass_g: 30               # Total thermal management
  cost_usd: 20

battery:
  capacity_mah: 2000
  mass_g: 55               # Larger battery — solar-powered, no tether
  cost_usd: 10

storage_hopper:
  hopper_mass_g: 0          # No hopper — handles cargo pods, not loose material
  capacity_g: 0

power:
  source: solar
  notes: "Solar + battery. No tether — operates on surface."

notes: |
  Couriers are the most expensive ants but the fewest in number. They operate
  on the asteroid surface in full vacuum with extreme thermal cycling.

  All actuators must be vacuum-rated. Solar panels + battery for power.
  Small sail for station-keeping near the asteroid.

  End-of-life role: attach to return cargo as guidance unit. The courier's
  sensors (IMU, sun sensor) and compute provide navigation for the return trip.

  Consider radiation exposure limits — dosimeter tracks cumulative dose.
  Replace couriers when they approach component radiation lifetime limits.
