# Taskmaster Ant — Squad leader with full sensor suite
# Same body plan as worker (6 legs + 2 mandibles) but with ESP32-S3
# and rich sensor loadout. Permanently equipped with sensor cluster —
# does not swap tools. Commands a squad of ~20 workers.

caste: taskmaster
chassis:
  type: hexapod_with_mandibles
  base_mass_g: 25
  mass_budget_g: 400

compute:
  part_id: esp32_s3
  mass_g: 10
  power_draw_mw: 250
  cost_usd: 5

locomotion:
  legs: 6
  leg_dof: 1
  part_id: sg90_servo
  per_unit_mass_g: 9
  per_unit_power_mw: 600
  per_unit_cost_usd: 3

mandibles:
  count: 2
  part_id: sg51r_micro_servo
  per_unit_mass_g: 5
  per_unit_power_mw: 300
  per_unit_cost_usd: 2
  dof_per_mandible: 1
  grip_force_n: 1.5
  tool_mount:
    type: permanent_sensor_cluster
    note: "Taskmasters don't swap tools — sensor cluster is permanently mounted"

communication:
  - id: local_rf
    part_id: nrf24l01_rf
    mass_g: 2
    power_mw: 40
    cost_usd: 2
    range_m: 50
    bandwidth_kbps: 250
    purpose: "short-range to workers"
  - id: backbone
    type: wired_can_bus
    mass_g: 5
    power_mw: 10
    cost_usd: 3
    bandwidth_kbps: 1000
    purpose: "wired backbone to mothership"

sensors:
  - part_id: bno055_imu
    mass_g: 3
    power_mw: 12
    cost_usd: 20
    purpose: "9-axis IMU for tunnel navigation"
  - part_id: vl53l0x_lidar
    mass_g: 1
    power_mw: 20
    cost_usd: 4
    purpose: "proximity / tunnel mapping"
  - part_id: ov7670_camera
    mass_g: 3
    power_mw: 60
    cost_usd: 4
    purpose: "low-res visual odometry"
  - part_id: as7341_spectral
    mass_g: 1
    power_mw: 15
    cost_usd: 12
    purpose: "spectral composition analysis at work face"
  - part_id: ds18b20_temp
    mass_g: 1
    power_mw: 1
    cost_usd: 2
    purpose: "temperature monitoring"

tool_system:
  current_tool: sensor_cluster   # Permanent — not swappable
  compatible_tools: []           # Taskmasters don't use the tool dock

storage_hopper:
  hopper_mass_g: 0
  capacity_g: 0

power:
  source: tethered
  tether_connector_mass_g: 3
  backup_battery:
    capacity_mah: 1000
    mass_g: 30
    cost_usd: 5

squad_size: 20

physical_dimensions:
  body_length_mm: 140           # Slightly larger than worker
  body_width_mm: 70
  body_height_mm: 45
  leg_span_mm: 200
  mandible_reach_mm: 40
  total_length_mm: 180
  ground_clearance_mm: 35
  sensor_cluster_height_mm: 25  # Visible dome on head

notes: |
  Taskmasters are the brains. Same body plan as workers but with ESP32-S3
  (more compute) and a permanent sensor cluster instead of swappable tools.

  The sensor cluster is mounted between the mandibles where a tool head
  would go. The mandibles hold it in place and can adjust its angle for
  scanning (spectral sensor needs to point at the rock face).

  Taskmasters handle:
  - Navigation (IMU + visual odometry + lidar mapping)
  - Mineral classification (spectral sensor at work face)
  - Worker assignment (radio commands for role/tool changes)
  - Anomaly detection (monitors for unusual patterns)
  - Mothership communication (wired backbone relay)

  Servo count: 6 leg + 2 mandible = 8 total (same as worker)
