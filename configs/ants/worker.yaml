# Worker Ant — Universal tunnel laborer with modular tool system
# The bulk of the swarm. 8 walking legs + 2 mandible arms.
# Swaps tool heads at tool docks based on current assignment.
# Can perform ANY tunnel role: mining, hauling, sorting, plastering, tending.
#
# MuJoCo sim verified: 8-leg alternating quadruplet gait needs 50% less
# grip force than 6-leg tripod (0.008 N vs 0.016 N/foot on Bennu).
# Self-sufficient on all asteroid surfaces -- no chain or rail required.

caste: worker
chassis:
  type: octopod_with_mandibles    # 8 legs (was hexapod, upgraded per MuJoCo sim)
  base_mass_g: 22                 # Lighter frame to stay within mass budget
  mass_budget_g: 250
  abdomen_grip_socket:
    description: >
      Pair of mandible-width grooves on rear of abdomen for ant-to-ant
      chaining. Same profile as tool head mount channels. Zero mass
      cost -- geometry printed into the chassis.
    groove_width_mm: 3
    groove_depth_mm: 1.5
    purpose: "tactical chain formation (bridge, rescue, traverse)"

compute:
  part_id: rp2040
  mass_g: 5                    # Pico board
  power_draw_mw: 100
  cost_usd: 4

locomotion:
  legs: 8                        # 4 pairs (was 3 pairs / 6 legs)
  leg_dof: 1                    # 1 servo per leg (basic). 2-DOF = future upgrade
  part_id: sg90_servo
  per_unit_mass_g: 9
  per_unit_power_mw: 600
  per_unit_cost_usd: 3
  gait: alternating_quadruplet   # Group A: 0,3,4,7 / Group B: 1,2,5,6
  leg_pair_spacing_mm: 12        # 4 pairs along 55mm thorax
  rationale: >
    8-leg alternating needs 0.008 N/foot grip (vs 0.016 for 6-leg tripod).
    25x safety margin on worst-case C-type rubble with hybrid foot pads.
    Self-sufficient on all surfaces -- no rail or chain needed for walking.
    Cost: +$6 per ant (+2 servos, +2 foot pads). Worth it for 50% less
    grip requirement and better stability.

mandibles:
  count: 2
  part_id: sg51r_micro_servo   # Smaller servo for manipulation arms
  per_unit_mass_g: 5
  per_unit_power_mw: 300
  per_unit_cost_usd: 2
  dof_per_mandible: 1          # Open/close. 2-DOF (+ up/down) = future upgrade
  grip_force_n: 1.5
  tool_mount:
    type: magnetic_clip         # Tool heads snap on magnetically
    mount_width_mm: 15
    mount_depth_mm: 10
    magnet_diameter_mm: 4       # Small neodymium disc magnet
    magnet_pull_force_n: 3      # Holds tool securely during operation

communication:
  part_id: nrf24l01_rf
  mass_g: 2
  power_mw: 40
  cost_usd: 2
  range_m: 50
  bandwidth_kbps: 250

sensors:
  - part_id: vl53l0x_lidar
    mass_g: 1
    power_mw: 20
    cost_usd: 4
    purpose: "proximity / collision avoidance"

tool_system:
  current_tool: null             # Set at runtime by taskmaster assignment
  tool_swap_time_seconds: 30     # Time to travel to dock and swap
  compatible_tools:
    - drill_head
    - scoop_head
    - paste_nozzle
    - thermal_rake
    - sampling_probe
    - cargo_gripper
  tool_dock_locations:
    - "tunnel_entrance"
    - "bioreactor_bay"
    - "thermal_sorting_station"
    - "cargo_staging_area"

storage_hopper:
  hopper_mass_g: 8              # Thin-wall 3D printed, clips to abdomen
  capacity_g: 200               # Detachable — different sizes per role

power:
  source: tunnel_power_rail
  description: >
    NOT tethered — uses a power rail system along tunnel walls.
    Two copper strips (+ and -) run along the sealed tunnel surface.
    Each ant has a spring-loaded sliding contact arm that maintains
    connection while moving. Like a slot car or subway third rail.
    No cables, no tangling, no snagging.
  rail_contact:
    type: spring_loaded_brush
    mass_g: 3
    contact_force_n: 0.5
    materials: "copper brush on phosphor bronze spring"
    cost_usd: 0.50
  backup_power:
    type: supercapacitor
    part_id: supercapacitor_backup
    capacitance_f: 50                  # Larger: covers rail gaps + work face time
    energy_wh: 0.2                     # ~2 minutes off-rail at full power
    charge_time_seconds: 10
    mass_g: 12
    cost_usd: 4.00
    cycle_life: 1000000
    covers:
      - "Rail junction crossings (1-2 seconds)"
      - "Work face operations off-rail (up to 2 minutes)"
      - "Tool dock visits"
      - "Crossing between tunnel branches"
    note: >
      The supercapacitor charges continuously while on the rail.
      When the ant leaves the rail (at work face or crossing a junction),
      the supercap provides 2 minutes of full-power operation.
      If it runs out, the ant stops and waits — not destructive, just stuck.

tunnel_power_infrastructure:
  description: >
    Power rails installed by workers alongside wall sealing.
    Three-worker convoy: miner -> plasterer -> rail layer.
  rail_options:
    copper_from_earth:
      description: "Ship 112 kg copper strip from Earth. Best conductivity."
      rail_type: "copper strip bonded to tunnel wall paste"
      rail_width_mm: 10
      rail_thickness_mm: 1
      mass_per_meter_g: 90             # Both rails combined
      voltage_v: 12
      max_current_a: 5
      earth_supply_needed_kg: 112      # For 1.2km of tunnel
      note: "112 kg = 0.4% of Starship capacity. The pragmatic choice."
      steel_foil_backing:
        description: >
          Thin mild steel foil laminated behind the copper strip.
          Provides a ferromagnetic surface for magnetic foot pads.
          Ants walk along the rail like a magnetic highway -- power
          AND grip from the same infrastructure. Eliminates the
          C-type asteroid grip problem (non-magnetic regolith).
        material: "mild steel foil"
        thickness_mm: 0.1
        width_mm: 12                   # Slightly wider than copper for margin
        mass_per_meter_g: 9.4          # 0.1mm x 12mm x 7.87 g/cm3
        earth_supply_needed_kg: 11.3   # For 1.2km of tunnel
        magnetic_grip_force_n: 1.5     # From 3mm N52 foot magnet
        note: >
          11.3 kg of steel foil = 0.04% of Starship capacity.
          Turns every tunnel into a magnetic walking path.
          Fire ant inspired: ants chain from rail to work face.
    iron_local:
      description: "Use extracted iron for rails. No Earth supply needed."
      rail_type: "sintered iron strip, wider to compensate for higher resistance"
      rail_width_mm: 25                # Wider to carry same current
      rail_thickness_mm: 2
      mass_per_meter_g: 400            # Heavier but iron is free
      voltage_v: 48                    # Higher voltage compensates for resistance
      max_current_a: 3
      earth_supply_needed_kg: 0
      note: "Iron is 200,000 ppm on Bennu. Effectively unlimited supply."
    hybrid:
      description: "Copper for main tunnels, iron for branches."
      earth_supply_kg: 50              # Copper for main trunk only
      local_iron_for_branches: true
      note: "Best of both: copper where it matters, iron where it's cheap."
  default: copper_from_earth
  installation:
    method: "three-worker convoy: miner -> plasterer -> rail layer"
    rate_m_per_hour: 10
    workflow:
      - "Worker #1 (drill_head): excavates rock face"
      - "Worker #2 (paste_nozzle): seals wall with waste slurry (2-3m behind)"
      - "Worker #3 (cargo_gripper): presses strip into soft paste (1-2m behind)"
    note: "Copper strip from Earth supply or iron strip from sintering furnace"
  junctions:
    type: "ramped overlap for smooth brush transition"
    gap_at_junction_mm: 2
  traffic:
    main_tunnel: "dual rail (bidirectional, ants on opposite walls)"
    branch_tunnel: "single rail (one-way, ants reverse at work face)"

foot_pads:
  part_id: foot_pad
  type: universal_hybrid_grip
  count: 8                        # One per leg
  per_unit_mass_g: 1.1
  per_unit_cost_usd: 0.30
  diameter_mm: 8
  thickness_mm: 3
  attachment: "press-fit to servo horn arm at leg tip"
  grip_layers:
    magnet:
      status: "REMOVED -- metallic debris accumulation"
      note: >
        S-type regolith is 20-25% iron. Permanent magnets in feet would
        accumulate metallic grains, burying microspines. Magnetic grip
        for the steel rail is handled by the rail contact brush instead.
    microspines:
      count: 8
      material: "0.3mm spring steel wire"
      grip_on_rock_n: "0.2-2.0"   # Depends on surface roughness
      passive: true
    penetrator_studs:
      count: 4
      height_mm: 2
      material: "PETG (integral with frame)"
      passive: true
  primary_grip_surface: "microspines + studs (self-sufficient all surfaces)"
  rail_grip: "spring-loaded rail contact brush (magnetic via steel foil)"
  off_rail_grip: "microspines + studs (15x margin, 2 min supercap window)"
  scad_file: "scad/foot_pad.scad"

chain_formation:
  status: "tactical tool, NOT required for locomotion"
  description: >
    Fire ant-inspired chains for specific situations only.
    8-leg ants walk independently on all surfaces (25x grip margin).
    Chains are temporary, formed on-demand, dissolved when done.
    Mandibles grip neighbor's abdomen grip socket (1.5 N per link).
    NOT a lifeline -- a tactical tool for rare edge cases.
  mandible_link_force_n: 1.5      # Per mandible, gripping neighbor socket
  chain_length_max: 5             # Sim verified: stable up to 5 links
  grip_interface: "abdomen_grip_socket (rear of chassis)"
  use_cases:
    - "Bridge a void or gap (no walkable surface)"
    - "Rescue a floating ant (rare failure recovery)"
    - "Traverse a boulder too smooth for microspines"
    - "Temporary brace during tunnel expansion"
  not_for:
    - "Standard locomotion (foot pads handle all surfaces)"
    - "Permanent lifelines (wastes workforce)"
    - "Power rail walking (rail is a highway, not a requirement)"

physical_dimensions:
  body_length_mm: 120           # Thorax + abdomen
  body_width_mm: 60
  body_height_mm: 40
  leg_span_mm: 180              # Tip-to-tip when walking
  mandible_reach_mm: 40         # Forward reach of each mandible arm
  total_length_mm: 160          # Including mandibles extended
  ground_clearance_mm: 30

notes: |
  The worker is the universal unit. Every tunnel role is performed by
  the same ant body with a different tool head clipped to its mandibles.

  Role assignment flow:
  1. Taskmaster evaluates colony needs (mining vs sealing vs tending etc.)
  2. Taskmaster radios worker: "switch to plastering, dock at station 2"
  3. Worker walks to nearest tool dock
  4. Drops current tool head (magnetic release)
  5. Picks up new tool head (magnetic clip)
  6. Walks to assigned work area
  7. Performs new role until reassigned

  This means the colony can dynamically shift workforce allocation.
  Pressure breach? 20 miners become 20 plasterers in minutes.
  Bioreactor alarm? 5 miners become 5 tenders immediately.

  Servo count: 8 leg servos + 2 mandible servos = 10 total
  Future upgrade: 2-DOF legs (16 leg servos) + 2-DOF mandibles (4 arm servos) = 20 total
