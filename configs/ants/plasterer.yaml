# Plasterer Ant — Tunnel wall sealing specialist
# Applies waste slurry from bioreactor processing to tunnel walls as sealant.
# The "mud dauber wasp" of the swarm — builds infrastructure from waste material.
# Worker-class body with paste applicator tool.

caste: plasterer
base_caste: worker
chassis:
  type: spider_6leg
  base_mass_g: 20
  mass_budget_g: 230

compute:
  part_id: rp2040
  mass_g: 5
  power_draw_mw: 100
  cost_usd: 4

locomotion:
  actuators: 6
  part_id: sg90_servo
  per_unit_mass_g: 9
  per_unit_power_mw: 600
  per_unit_cost_usd: 3

communication:
  part_id: nrf24l01_rf
  mass_g: 2
  power_mw: 40
  cost_usd: 2
  range_m: 50
  bandwidth_kbps: 250

sensors:
  - part_id: vl53l0x_lidar
    mass_g: 1
    power_mw: 20
    cost_usd: 4
    purpose: "proximity / wall distance measurement for even coating"
  - id: pressure_sensor
    type: mems_pressure_sensor
    mass_g: 1
    power_mw: 10
    cost_usd: 3
    purpose: "monitor local tunnel pressure — detect leaks in freshly sealed areas"

tool:
  type: paste_applicator
  description: >
    Nozzle-and-trowel system for applying waste slurry paste to tunnel walls.
    The nozzle extrudes paste from an onboard reservoir. The trowel (flat paddle)
    smooths the applied layer to uniform thickness. Think of a plasterer with
    a caulk gun and a putty knife.
  nozzle:
    type: peristaltic_squeeze
    flow_rate_ml_per_min: 20
    power_mw: 50
  trowel:
    type: flat_paddle
    width_mm: 40
    material: stainless_steel
  reservoir:
    capacity_ml: 150             # ~200g of paste per load
    refill_method: "return to slurry tank, gravity/pump fill"
  mass_g: 25
  power_mw: 50
  cost_usd: 10
  coverage_m2_per_load: 0.3      # ~150ml spread 0.5mm thick over 0.3 m^2

storage_hopper:
  hopper_mass_g: 0               # No regolith hopper — uses paste reservoir instead
  capacity_g: 0

power:
  source: tethered
  tether_connector_mass_g: 3
  backup_battery:
    capacity_mah: 500
    mass_g: 15
    cost_usd: 3

behavior:
  state_machine:
    - IDLE: "Wait at slurry tank for assignment"
    - FILL: "Load paste reservoir from waste slurry processing tank"
    - TRAVERSE: "Move to assigned tunnel wall section"
    - APPLY: "Extrude paste onto wall surface via nozzle"
    - SMOOTH: "Trowel paste to uniform ~0.5mm thickness"
    - INSPECT: "Check coating with lidar — flag thin spots"
    - PRESSURE_CHECK: "Monitor local pressure sensor for leak detection"
    - RETURN: "Return to slurry tank for refill"
  cycle_time_minutes: 20         # One reservoir load cycle
  coverage_per_cycle_m2: 0.3
  target_coating_thickness_mm: 0.5

waste_slurry_sealant:
  description: >
    Bioreactor waste (depleted rock fines from bioleaching) mixed with small
    amount of water to form a paste. Applied to tunnel walls, water evaporates
    in 5 kPa environment leaving a hardened mineral coating.
  composition:
    rock_fines_pct: 70           # Depleted mineral particles, 2mm grain size crushed further
    water_pct: 25                # Binder — evaporates to harden
    residual_bacteria_pct: 3     # Harmless, may actually improve binding
    reagent_traces_pct: 2        # Calcium oxide etc. — acts as cement!
  properties:
    wet_density_g_per_ml: 1.8
    dry_density_g_per_ml: 2.1
    setting_time_hours: 4        # At 5 kPa, water evaporates slowly
    compressive_strength_mpa: 2  # Low but sufficient (no structural load in microgravity)
    gas_permeability: "low"      # Roughly equivalent to unfired clay
    seal_effectiveness: 0.75     # 75% pressure retention — not as good as polymer but FREE
  advantages:
    - "Zero consumable cost — made entirely from mining waste + water"
    - "Infinite supply — scales with mining operations"
    - "The CaO reagent traces act as natural cement (Portland cement is limestone!)"
    - "Residual bacteria may produce biofilm that further seals micro-pores"
    - "Closes the waste loop — no waste disposal problem"
  disadvantages:
    - "Lower seal quality than polymer spray (75% vs 98%)"
    - "Requires multiple coats for reliable seal"
    - "Setting time is slow (4 hours per coat)"
    - "May crack if tunnel wall shifts (unlikely in microgravity)"
  recommended_use: >
    Primary sealing method for established tunnels (where some leak is acceptable).
    Use polymer spray for critical seals (bioreactor bay, mothership seal).
    Waste slurry + polymer spray combination gives best results:
    waste slurry as bulk filler, polymer spray as final coat.

notes: |
  Plasterer ants are the builders of the colony. They take waste from
  bioleaching and turn it into tunnel infrastructure — a perfect closed loop.

  Biological inspiration: mud dauber wasps build nests from mud paste.
  Termites build massive mounds from chewed wood + saliva. The plasterer
  ant does the same thing with rock paste.

  The CaO (calcium oxide / lime) used in the precipitation stage is the
  same chemistry as Portland cement. When it mixes with water and fine
  rock particles, it sets into a crude concrete. This is an accidental
  benefit of the bioleaching reagent choice.

  Plasterer ants can also repair damaged seals — detect the leak with
  their pressure sensor, apply fresh paste, smooth it, and move on.

  Ratio: 2-3 plasterer ants per active tunnel section. They work
  continuously behind the mining front, sealing newly dug walls.
