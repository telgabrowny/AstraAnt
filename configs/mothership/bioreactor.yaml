# Mothership Module: Bioreactor Bay (bioleaching and hybrid tracks only)
# Centrifuge bioreactors for microgravity bioleaching operations.

module: bioreactor
name: "Centrifuge Bioleaching Bay"
type: bioprocessing
tracks: ["bioleaching", "hybrid"]    # Only included for bioleaching/hybrid missions

centrifuge_system:
  design: rotating_drum
  rotation_rate_rpm: 20-40           # Provides 0.01-0.1g equivalent
  bearing_type: magnetic_bearing     # No lubricant outgassing
  bearing_power_per_vessel_w: 5
  spin_up_power_per_vessel_w: 20     # Brief during startup
  structural_mass_overhead_factor: 1.3  # 30% heavier than static vessels

crusher:
  type: jaw_crusher_mini
  input_size_mm: 50
  output_size_mm: 2                  # Grain size for bacterial access
  throughput_kg_per_hour: 5
  power_w: 200
  mass_kg: 30
  wear_parts:
    jaw_plates: manganese_steel
    replacement_interval_hours: 500
    spare_sets: 3
    spare_mass_kg: 6
  # Track A: crusher is the final processing step (output = crushed ore)
  # Track B: crusher feeds bioreactor vats
  # Track C: same as Track B but higher throughput prioritized

vat_sulfide:
  name: "Sulfide Metal Bioreactor"
  volume_liters: 200
  vessel_material: stainless_316L
  vessel_mass_kg: 32.5              # 25 kg static × 1.3 centrifuge
  centrifuge_rpm: 30
  bacteria:
    - species_id: acidithiobacillus_ferrooxidans
    - species_id: acidithiobacillus_thiooxidans
  target_metals: [iron, copper, nickel, cobalt, zinc]
  operating_conditions:
    ph_target: 2.0
    ph_range: [1.5, 2.5]
    temp_target_c: 30
    temp_range_c: [25, 35]
  residence_time_days: 15
  extraction_efficiency: 0.85
  aeration:
    type: membrane_gas_exchanger     # No bubbles needed in centrifuge
    power_w: 10
    mass_kg: 1
  heating_power_w: 50
  monitoring:
    - part_id: atlas_scientific_ph
      power_mw: 50
    - part_id: atlas_scientific_orp
      power_mw: 50
    - part_id: ds18b20_temp
      power_mw: 5
  failure_modes:
    - type: culture_crash
      trigger: "pH outside 1.0-3.5 for >2 hours"
      recovery_time_days: 5
      recovery_method: "reinoculate from backup culture stock"
    - type: contamination
      trigger: "foreign organism detected via ORP anomaly"
      recovery_time_days: 7
      recovery_method: "drain, sterilize, reinoculate"
    - type: nutrient_depletion
      trigger: "Fe2+ substrate exhausted"
      recovery_time_days: 1
      recovery_method: "add fresh substrate from ore processing"

vat_ree:
  name: "Rare Earth Element Bioreactor"
  volume_liters: 100
  vessel_material: HDPE
  vessel_mass_kg: 13                 # 10 kg × 1.3
  centrifuge_rpm: 25
  organisms:
    - species_id: aspergillus_niger
  target_metals: [lanthanum, cerium, neodymium, yttrium, aluminum]
  operating_conditions:
    ph_target: 4.0
    ph_range: [3.0, 5.0]
    temp_target_c: 28
    temp_range_c: [25, 30]
  residence_time_days: 14
  extraction_efficiency: 0.60
  nutrient_consumption_kg_per_cycle: 1.0  # Sucrose feedstock
  heating_power_w: 30
  failure_modes:
    - type: culture_crash
      trigger: "pH outside 2.5-6.0 for >4 hours"
      recovery_time_days: 3
      recovery_method: "reinoculate from spore stock (fungal spores more resilient)"
    - type: nutrient_starvation
      trigger: "sucrose supply exhausted"
      recovery_time_days: 0          # Resume immediately when resupplied
      recovery_method: "add sucrose from consumables stock"

vat_pgm:
  name: "Platinum Group Metals Bioreactor"
  volume_liters: 50
  vessel_material: stainless_316L
  vessel_mass_kg: 10.4               # 8 kg × 1.3
  centrifuge_rpm: 20
  bacteria:
    - species_id: chromobacterium_violaceum
  target_metals: [platinum, palladium, iridium, rhodium]
  operating_conditions:
    ph_target: 7.5
    ph_range: [7.0, 9.0]
    temp_target_c: 28
    temp_range_c: [25, 30]
  residence_time_days: 30
  extraction_efficiency: 0.40        # PGM bioleaching is less mature
  sealed: true                       # Biogenic cyanide — vessel must be sealed
  heating_power_w: 20
  chemical_backup:
    reagent_id: sodium_cyanide
    concentration_g_per_liter: 2
    consumption_per_cycle_kg: 0.5
    use_condition: "if biological extraction underperforms threshold"
  failure_modes:
    - type: culture_crash
      trigger: "pH outside 6.0-10.0 for >3 hours"
      recovery_time_days: 7          # Slowest to recover
      recovery_method: "reinoculate from backup stock"
    - type: cyanide_buildup
      trigger: "HCN concentration exceeds safe threshold in sealed headspace"
      recovery_time_days: 2
      recovery_method: "vent sealed headspace to vacuum, restart culture"

precipitation:
  stages:
    - metal: copper
      precipitation_ph: 5.3
      reagent_id: calcium_oxide
    - metal: nickel
      precipitation_ph: 7.5
      reagent_id: sodium_hydroxide
    - metal: cobalt
      precipitation_ph: 8.1
      reagent_id: sodium_hydroxide
    - metal: rare_earths
      precipitation_ph: 8.5
      reagent_id: sodium_hydroxide
  pump:
    type: peristaltic_pump_mini
    flow_rate_ml_per_min: 100
    power_w: 5
    mass_g: 500
    count: 4                         # One per stage
  filter:
    type: ceramic_filter_element
    pore_size_um: 0.5
    mass_g: 200
    replacement_interval_days: 90
    spare_count: 8                   # 2 years of replacements

water_recovery:
  recirculation_rate: 0.95
  loss_per_cycle_liters: 5
  ph_adjustment_reagent_id: sulfuric_acid
  recovery_pump:
    power_w: 5
    mass_g: 300

backup_culture_stock:
  type: lyophilized                  # Freeze-dried, long shelf life
  species:
    - acidithiobacillus_ferrooxidans
    - acidithiobacillus_thiooxidans
    - aspergillus_niger
    - chromobacterium_violaceum
  doses_per_species: 5
  total_mass_kg: 0.5
  shelf_life_years: 10
  storage: "sealed vials, radiation-shielded compartment"

radiation_shielding:
  bio_bay_location: "minimum 2m below asteroid surface"
  additional_shielding:
    type: water_jacket
    thickness_cm: 10                 # ~10 g/cm2 additional shielding
    purpose: "water supply doubles as radiation shield for bacteria"
    notes: "Water positioned around vats — serves dual purpose"

consumables_summary:
  initial_water_liters: 300          # = 300 kg
  sucrose_per_year_kg: 12            # REE vat nutrient
  reagents_per_year_kg: 8            # Precipitation chemicals
  filter_replacements_per_year: 4
  sodium_cyanide_per_year_kg: 2      # PGM backup
  total_consumables_per_year_kg: 25

mass_summary:
  crusher_kg: 36                     # Including spare jaw plates
  vat_sulfide_kg: 32.5
  vat_ree_kg: 13
  vat_pgm_kg: 10.4
  precipitation_system_kg: 4.4
  water_recovery_kg: 0.8
  backup_cultures_kg: 0.5
  plumbing_and_structure_kg: 12
  total_dry_mass_kg: 110
  water_mass_kg: 300
  total_wet_mass_kg: 410

power_summary:
  crusher_w: 200
  vat_sulfide_w: 75                  # Heating + aeration + bearing + monitoring
  vat_ree_w: 45
  vat_pgm_w: 35
  precipitation_w: 25
  water_recovery_w: 5
  total_power_w: 385

notes: |
  The bioreactor bay is the heaviest module by far — 410 kg wet.
  The 300 kg of water dominates the launch mass for Track B/C.

  All bioreactors use centrifuge design for microgravity fluid handling.
  The 30% mass overhead is the cost of making biology work in space.

  Failure modes are modeled explicitly. Culture crashes happen — the sim
  should trigger them probabilistically and model recovery time.
  Recovery depends on having backup culture stock (5 doses per species).

  The bioreactor bay must be located at least 2m underground for
  radiation shielding. The water jacket provides additional protection.

  Track C (hybrid) uses the same bioreactor bay as Track B, but receives
  pre-crushed material from the mechanical mining ants, potentially
  improving extraction kinetics due to finer grain size.
