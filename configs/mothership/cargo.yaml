# Mothership Module: Cargo Staging & Return Vehicle Dock
# Manages processed material, packages into cargo pods, stages return vehicles.

module: cargo
name: "Cargo Staging & Return Vehicle Dock"
type: return_vehicle_staging

storage_bins:
  count: 4
  capacity_per_bin_kg: 150
  total_capacity_kg: 600
  bin_material: aluminum_honeycomb
  bin_mass_each_kg: 2
  total_bin_mass_kg: 8
  segregation:
    - bin: 1
      contents: "high_value_metals"  # PGM, rare earths
    - bin: 2
      contents: "base_metals"        # Copper, nickel, cobalt
    - bin: 3
      contents: "iron_nickel"        # Bulk structural metals
    - bin: 4
      contents: "water_ice"          # If available — extremely valuable

compactor:
  type: regolith_bag_compactor
  power_w: 50
  mass_kg: 5
  throughput_kg_per_hour: 20
  compression_ratio: 2              # Doubles density of loose material
  bag_material: kevlar_fabric
  bag_mass_g: 100                   # Per cargo bag

return_vehicle_dock:
  capacity: 5                        # Vehicles stored/staged simultaneously
  assembly_area: true                # Space to attach sail to cargo pod
  launch_rail:
    type: electromagnetic_rail       # Low-velocity launch assist
    length_m: 3
    mass_kg: 10
    launch_velocity_m_per_s: 5       # Gentle push — sail does the rest
    power_w: 200                     # Brief pulse during launch

return_vehicle_inventory:
  # MICRO-POD DESIGN: many small packages, not one big truck.
  # Solar sail transit time scales with mass -- 2 kg pod with 10m2 sail
  # reaches lunar orbit in ~2.5 years. 100 kg pod would take 54 years.
  # The ant philosophy: thousands of small deliveries, continuous stream.

  # --- CONFIGURABLE TRADE STUDY PARAMETERS ---
  vehicles_per_mission: 200          # Flat-packed. Increase for higher throughput.
  pods_per_day: 3                    # Launch rate. Limited by loading automation.
  cargo_capacity_kg: 2               # Per pod. Trade: more cargo = slower transit.
  # Adjust these three parameters for trade studies:
  # More pods/day = faster delivery but need faster loading
  # More cargo/pod = need bigger sail or accept longer transit
  # More vehicles = more launch mass but higher lifetime throughput

  vehicle_config:
    structure:
      type: "ferrocement_composite"
      description: >
        Pod shell is 3D-printed PETG lattice scaffold filled with
        bioreactor waste paste (depleted rock fines + CaO cement traces).
        The PETG provides tensile strength, the paste provides mass and
        compressive strength. Essentially ferrocement -- one of the oldest
        and most durable construction materials, made from mining waste.
      scaffold_mass_g: 50            # 3D printed PETG lattice
      paste_fill_mass_g: 100         # Waste slurry, sets in 4 hours
      total_structure_mass_g: 150    # Scaffold + fill
      cost_usd: 0.50                # Just PETG filament -- paste is free
      printable: true
      print_time_hours: 0.5
      note: "Pod shell is literally made of garbage. Zero waste."

    sail:
      area_m2: 10                    # ~70g film + 30g deployment booms
      mass_g: 100
      material: cp1_polyimide

    co2_kick_motor:
      type: cold_gas_co2_thruster
      description: >
        Simple cold gas thruster using CO2 captured from the thermal sorter.
        A small steel tank pressurized with CO2, a wax-plug valve that melts
        with a resistor (fire-and-forget), and a drilled nozzle. No combustion,
        no ignition system, no moving parts except the valve.
        Like a Sterno can but for rockets.
      propellant: "CO2 (captured from thermal sorter -- FREE)"
      propellant_mass_g: 200         # Soda-can-sized tank
      tank_mass_g: 50                # Small steel cylinder
      nozzle_mass_g: 5               # Drilled steel disc
      valve:
        type: wax_plug_with_resistor
        mass_g: 5
        activation: "resistor melts wax on guidance command"
      total_thruster_mass_g: 260
      performance:
        isp_seconds: 70
        delta_v_m_per_s: 56          # With 200g CO2 on 2.5 kg pod
        burn_time_seconds: 5
        transit_reduction_pct: 15    # ~15% faster with initial kick
      cost_usd: 2                    # Steel tube + wax + resistor
      note: "CO2 is free (waste product). Tank is a small steel tube. Total cost: $2."

    guidance:
      source: "end_of_life_surface_ant"
      description: >
        An end-of-life surface ant (degraded actuators, high rad dose)
        is stripped to its ESP32-S3 + sun sensor + IMU and attached
        to the cargo pod. Disposable autopilot for 1-3 year transit.
      controller: esp32_s3
      sun_sensor_mass_g: 10
      imu_mass_g: 3
      total_guidance_mass_g: 50

    capture_strategy: lunar_orbit_insertion

    # Mass budget per pod
    mass_breakdown_g:
      structure: 150                 # Ferrocement shell (PETG + waste paste)
      sail: 100
      co2_thruster: 260              # Tank + propellant + valve + nozzle
      guidance: 50
      total_empty_g: 560
    vehicle_empty_mass_g: 560
    vehicle_with_cargo_kg: 2.56      # 0.56 kg vehicle + 2 kg cargo
    vehicle_cost_usd: 3              # Sail $0.50 + structure $0.50 + thruster $2

    estimated_transit:
      sail_only:
        to_lunar_orbit_years: 2.5
        to_mars_orbit_years: 4.0
      with_co2_kick:
        to_lunar_orbit_years: 2.1    # ~15% faster
        to_mars_orbit_years: 3.4
      confidence: "medium"

  total_vehicle_mass_kg: 112         # 200 x 0.56 kg each
  total_vehicle_cost_usd: 600        # 200 x $3 each
  throughput:
    pods_per_day: 3
    kg_per_day: 6
    kg_per_month: 180
    kg_per_year: 2190
  note: >
    Each pod costs $3, carries 2 kg of material worth $100K+ at destination.
    33,000x return per pod. The pod shell is made from mining waste (free),
    the CO2 propellant is captured from thermal processing (free), and the
    guidance computer is a recycled dying surface ant (free). The only
    purchased materials are sail film ($0.50) and a small steel thruster
    tube ($2).

loading_automation:
  type: conveyor_and_arm
  conveyor:
    length_m: 3
    power_w: 20
    mass_kg: 3
  loading_arm:
    type: 2dof_arm
    reach_m: 1
    payload_kg: 10
    power_w: 30
    mass_kg: 4
  cycle_time_minutes: 30             # Load one cargo pod

total_mass_kg: 100                   # Including 10 return vehicles
total_mass_without_vehicles_kg: 35
total_power_w_loading: 100           # During active loading
total_power_w_launch: 200            # Brief pulse
total_power_w_idle: 5                # Monitoring only

launch_procedure:
  - "Courier ant stages cargo bags at tunnel entrance"
  - "Loading arm transfers bags into cargo pod on dock"
  - "Sail deployed and attached to pod"
  - "Guidance system powered on, star tracker calibrated"
  - "Ground control authorizes launch (with comm delay)"
  - "Electromagnetic rail provides initial velocity boost"
  - "Sail unfurls, cargo pod begins transit to destination"
  - "End-of-life courier ant optionally attached as backup guidance"

notes: |
  The cargo module is where the economics happen — everything upstream
  (mining, bioleaching, processing) feeds into this staging area.

  Return vehicles are the main per-cycle cost item. At $1500 each and
  10 per mission, that's $15K in vehicles alone. But each carries 100 kg
  of material worth potentially millions at lunar/Mars orbit.

  The electromagnetic launch rail gives a gentle 5 m/s push to escape
  the asteroid's negligible gravity well. The solar sail handles the
  actual transit to the destination orbit.

  Loading is semi-automated — courier ants bring material to the dock
  area, the loading arm handles fine positioning into pods.
