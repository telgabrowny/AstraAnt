# Sous Vide Asteroid Mining -- Track D Mothership Manifest
# Wraps a 10m C-type asteroid in a membrane, melts interior ice,
# seeds bioleaching bacteria, harvests dissolved metals.
# 466 kg total. Fits on Falcon 9 rideshare. $7-15M per mission.
#
# The asteroid IS the bioreactor. No tunnels, no ants (except 4 for wrapping),
# no drill, no sealing problem, no power rails, no manufacturing.

track: sousvide
name: "Sous Vide Asteroid Mining Mothership"
target: "10m diameter C-type asteroids (water-bearing rubble piles)"

target_asteroid_specs:
  diameter_m: 10
  mass_tonnes: 628
  density_kg_per_m3: 1200
  porosity_pct: 57
  water_ice_pct: 8
  water_mass_tonnes: 50
  sulfide_minerals_pct: 2
  extractable_metal_tonnes: 12.6

mission_architecture:
  description: >
    Land on small asteroid, wrap in membrane, heat interior to melt
    ice, seed with bioleaching bacteria, pump pregnant solution through
    electro-winning cell, plate out metal cathodes. When done, recover
    membrane, hop to next same-size target. Repeat.
  reusable_between_targets: true
  targets_per_membrane_lifetime: 5-10
  time_per_asteroid_days: 180
  asteroids_per_year: 1-2          # Depending on transit time

# === MASS BUDGET ===
systems:

  structure:
    description: "Compact plug hull that seals into membrane gasket"
    dimensions: "0.8m dia x 1.5m tall cylinder"
    material: "aluminum 6061, 2mm wall"
    mass_kg: 23

  solar_concentrators:
    description: "Inflatable Mylar parabolic reflectors for heating asteroid"
    area_m2: 42
    diameter_m: 7.3                # Or 2x 5.2m dishes
    heating_power_kw: 23           # Thermal, at 1 AU
    heating_time_days: 30          # -40C to 30C for 628 tonnes
    mass_kg: 10
    heritage: "L'Garde inflatable antenna, NASA solar thermal propulsion"

  membrane:
    description: "Kapton/Kevlar wrap for entire asteroid"
    area_m2: 314
    areal_density_g_per_m2: 300
    pressure_rating_kpa: 100       # 2x safety factor over 50 kPa operating
    mass_kg: 94
    reusable: true
    includes: "gasket ports, seam reinforcements, deployment mechanism"

  electrolysis:
    description: "PEM electrolyzer -- splits asteroid water into O2 (for bacteria) + H2"
    o2_production_kg_per_day: 0.5
    mass_kg: 7.5

  pump_system:
    description: "Circulates bacteria-laden solution through rubble pile"
    pumps: 3                       # Inject, recirculate, drain
    flow_rate_liters_per_hour: 100
    includes: "acid-resistant tubing, filters, pH/ORP/temp sensors"
    mass_kg: 7.8

  electrowinning:
    description: "Plates dissolved metals from solution onto cathode blanks"
    cell_volume_liters: 5
    metals_recovered: ["copper", "nickel", "cobalt"]
    includes: "rectifier, starter cathodes, stripping jig"
    mass_kg: 13.5
    heritage: "200-year-old industrial technique, TRL 9"

  bacteria:
    description: "Freeze-dried bioleaching cultures"
    species:
      - "Acidithiobacillus ferrooxidans (iron/copper/nickel/cobalt)"
      - "Acidithiobacillus thiooxidans (sulfur oxidation, acid generation)"
    mass_kg: 1.0
    includes: "10 vials x 2 species, revival medium, shielded storage"
    note: "50g of culture contains billions of cells. They self-replicate to fill 50,000L in weeks."

  nutrients:
    description: "Initial kickstart nutrients for bacteria (4 asteroid supply)"
    contents:
      - "ferrous sulfate heptahydrate: 5 kg"
      - "ammonium sulfate: 3 kg"
      - "potassium phosphate: 1 kg"
      - "sulfuric acid (pH adjustment): 3 kg"
      - "spare packs for 3 more asteroids: 5 kg"
    mass_kg: 17
    note: "After initial seeding, bacteria feed on the asteroid's own iron sulfides"

  nitrogen:
    description: "Pressurization gas (50 kPa target, 80% recoverable between targets)"
    initial_fill_kg: 59
    tank_mass_kg: 18
    makeup_for_3_more_asteroids_kg: 30
    extra_tank_kg: 10
    mass_kg: 119
    optimization_note: >
      If bacteria tolerate 10 kPa (needs biological testing), nitrogen
      drops to 24 kg total. This single test could save 95 kg (20% of
      entire mothership mass).

  compute:
    description: "Raspberry Pi 4 -- monitor sensors, control pumps, telemetry"
    mass_kg: 0.2
    note: "Much simpler than tunnel colony brain. No ants to coordinate."

  comms:
    description: "X-band Earth link (same as tunnel mothership)"
    mass_kg: 4.5

  power:
    description: "GaAs solar panels for electrical systems"
    panel_area_m2: 3.5
    power_w: 1000
    battery_kwh: 5
    mass_kg: 20.1

  propulsion:
    description: "Hall-effect SEP for hopping between 10m asteroid targets"
    thrust_n: 0.1
    isp_s: 1500
    xenon_kg: 50
    delta_v_ms: 1400               # Generous margin for multiple hops
    mass_kg: 71

  surface_ants:
    description: "4 vacuum-rated ants for wrapping, monitoring, membrane repair"
    count: 4
    per_unit_mass_g: 430
    includes: "membrane gripper tool, seam welder, patch kit, inspection camera"
    mass_kg: 3.0

  cargo:
    description: "Storage for extracted metal cathodes"
    capacity_kg: 200
    mass_kg: 13

# === TOTALS ===
mass_subtotal_kg: 405.1
mass_margin_pct: 15
mass_total_kg: 466

# === LAUNCH OPTIONS ===
launch:
  recommended: "Falcon 9 rideshare to GTO, then SEP spiral to NEA"
  cost_launch_usd: "2-5M"
  cost_hardware_usd: "5-10M"
  cost_total_usd: "7-15M"
  comparison: "35x lighter, 10x cheaper than Starship tunnel mining mission"

# === EXPECTED YIELD PER ASTEROID ===
yield_per_10m_asteroid:
  iron_tonnes: 125.6               # Too much to carry, mostly left behind
  nickel_kg: 7300                  # At 85% extraction
  copper_kg: 64
  cobalt_kg: 267
  pgm_kg: 15                      # Needs separate C. violaceum phase
  total_high_value_kg: 7646
  note: >
    200 kg cargo capacity per trip. High-value metals (PGMs, cobalt)
    prioritized. Nickel stockpiled at asteroid for later bulk retrieval.
    Or use micro-pod return vehicles to ship continuously.

# === COMPARISON TO TUNNEL MINING ===
versus_tunnel:
  mothership_mass_ratio: "35x lighter (466 kg vs 16,000 kg)"
  cost_ratio: "10x cheaper ($7-15M vs $81-163M)"
  ant_count_ratio: "27x fewer (4 vs 108+)"
  sealing_problem: "eliminated (membrane IS the seal)"
  water_from_earth: "zero (asteroid has 50 tonnes)"
  bioreactor: "the asteroid itself (no centrifuge vats)"
  mechanical_complexity: "minimal (no tunneling, no drilling, no power rails)"
  throughput: "slower per day, but processes entire body (628 tonnes)"
  reusability: "membrane hops between targets"
  tradeoff: >
    Sous Vide is the scout/bootstrapper mission. Cheap, simple,
    proves the biology, builds a metal stockpile. Tunnel mining
    is the industrial-scale follow-on for 500m+ bodies once the
    technology and stockpile justify a Starship-class investment.

deployment_mechanism:
  description: "Parachute-fold + drawstring garbage bag"
  concept: >
    The membrane is pre-sewn as an oversized hemisphere with a
    drawstring mouth (like a garbage bag). Folded like a parachute
    in a 60cm canister on the mothership. Deploys in 2-4 hours.
  sequence:
    1: "Mothership approaches asteroid from one side (50m out)"
    2: "Spring mortar ejects folded membrane toward asteroid"
    3: "Gas puffs at rim pop the bag open (like an airbag)"
    4: "Open mouth drifts over asteroid (no air resistance in vacuum)"
    5: "4 surface ants guide edges around far side, tuck snags"
    6: "Kevlar drawstring cinches mouth closed (ant-operated winch)"
    7: "Mothership docks into pre-sewn gasket port at bag apex"
    8: "Inflate through mothership port to 50 kPa"
  bag_specs:
    shape: "hemisphere + cylindrical skirt with drawstring mouth"
    diameter_m: 14                   # Oversized for 10m rock (slack for irregularities)
    membrane_area_m2: 400
    drawstring: "Kevlar cord, 50m circumference, 5 kN rated"
    closure: "ant-operated winch or spring-loaded ratchet"
    gasket_port: "pre-sewn at bag apex, standard mothership interface"
    fold_pattern: "z-fold in 60cm diameter canister"
  heritage:
    - "TransAstra asteroid capture bag (ISS tested Oct 2025, 10m under NASA contract)"
    - "JWST sunshield (21m x 14m multilayer membrane, deployed flawlessly)"
    - "Solar sail deployments (JAXA IKAROS, Planetary Society LightSail)"
  deployment_time_hours: 2-4
  note: >
    The drawstring is the key insight. You don't gift-wrap an
    irregular shape. You throw a big bag over it and pull the
    bottom shut. Like putting a basketball in a grocery bag.

reusability:
  description: >
    After the first asteroid, the mothership is essentially
    self-sustaining. The previous asteroid's outputs become
    the next asteroid's inputs. Only xenon and nitrogen deplete.

  reusable_hardware:
    - "Membrane (5-10 deployments before replacement)"
    - "Solar concentrators (permanent)"
    - "Electrolysis, pumps, electro-winning cell (permanent)"
    - "Compute, comms, power, propulsion hardware (permanent)"
    - "Surface ants (permanent with maintenance)"

  self_replenishing_consumables:
    bacteria:
      status: "SELF-REPLICATING"
      strategy: >
        Save a culture sample from each asteroid. Reseed the next.
        After each asteroid, the bacteria are naturally selected
        for real asteroid conditions (directed evolution for free).
        After 5 asteroids, the culture is space-optimized.
    water:
      status: "ACCUMULATES"
      strategy: >
        Each C-type asteroid produces 50 tonnes of water.
        Keep 10-20 tonnes in reserve. Use it on the NEXT target,
        even if that target has no water (S-type for PGMs).
        The supply chain builds on itself.
    sulfuric_acid:
      status: "BACTERIA PRODUCE IT"
      note: "A. thiooxidans generates H2SO4 as its metabolic product"
    iron_nutrients:
      status: "MINING PRODUCES IT"
      note: "Dissolved iron from extraction IS the nutrient for A. ferrooxidans"
    cathode_blanks:
      status: "SELF-REPLACEABLE"
      note: "First set from Earth. Subsequent sets cut from extracted nickel."

  depleting_consumables:
    xenon:
      status: "ELIMINATED -- replaced by asteroid water"
      replacement: >
        Water electrothermal thruster (resistojet/arcjet, TRL 5-6).
        800 kg water per 10m asteroid delivery at 800s Isp.
        Water is FREE from previous asteroid (50 tonnes available).
        Heritage: Momentus water plasma thruster (flight proven).
    nitrogen:
      status: "ELIMINATED -- replaced by O2/CO2 from asteroid water"
      replacement: >
        Electrolysis produces O2 (bacteria need this anyway).
        CO2 released from heated carbonaceous regolith.
        O2 + CO2 atmosphere replaces N2 for pressurization.
        Bacteria evolved in O2/CO2 environments -- compatible.
    membrane:
      rated_deployments: "indefinite in Pac-Man mode (never folds)"
      replacement: "patch repairs by surface ants as needed"
      note: "In Pac-Man mode, processing bag never opens. Only airlock bag cycles."

  after_first_asteroid:
    from_earth: "NOTHING"
    description: >
      Water replaces every consumable:
        1. Bioleaching medium (the soup)
        2. Propellant (water arcjet, 800 kg per asteroid delivery)
        3. Oxygen for bacteria (electrolysis)
        4. Pressurization gas (O2 + CO2 atmosphere)
        5. Hydrogen byproduct (chemical feedstock)
      The system is fully self-sustaining from asteroid resources.
      The only item that eventually needs Earth resupply is the
      membrane (patch material) and possibly electronics spares.

  supply_chain_progression:
    asteroid_1:
      type: "C-type (water-rich)"
      inputs_from_earth: "everything (first mission)"
      outputs: "metals + 50 tonnes water + adapted bacteria + excess acid"
      keep: "10 tonnes water, bacteria sample, acid, nutrients"
    asteroid_2:
      type: "S-type (high PGMs, no water)"
      inputs_from_earth: "nothing new"
      inputs_from_asteroid_1: "water, bacteria, acid"
      outputs: "PGMs + nickel + doubly-adapted bacteria"
    asteroid_3:
      type: "C-type (replenish water)"
      inputs: "bacteria adapted to BOTH C and S type surfaces"
      outputs: "fresh water supply + metals + even better bacteria"
    note: >
      Each mission starts with MORE resources than the last.
      C-types provide water + base metals.
      S-types provide PGMs + nickel (using C-type water).
      Bacteria improve with each generation (directed evolution).

  cost_per_asteroid_after_first:
    xenon_transit: "$150K per resupply (every 3-4 asteroids)"
    membrane_replacement: "$300K (every 5-10 asteroids)"
    everything_else: "$0 (self-replenishing)"
    effective_cost: "~$50-100K per asteroid after initial $7-15M investment"

# === LONG-TERM OPERATIONS & LIFECYCLE ===

retired_chamber_uses:
  description: >
    Each retired chamber is a pressure-tight, armored, temperature-controlled
    room in space. Older (inner) chambers are the most protected -- buried
    under layers of newer shell. These become leasable infrastructure.
  by_age:
    newest_retired:
      size: "largest"
      protection: "outer shell only"
      best_use: "materials warehouse (easy customer access)"
    mid_age:
      protection: "several layers of armor"
      best_use: "manufacturing (forge, 3D printer, assembly bay)"
    old:
      protection: "deep inside station"
      best_use: "data center, comms relay (radiation-shielded)"
    very_old:
      protection: "maximum shielding"
      best_use: "biological lab, seed bank, culture archive"
    original_bag:
      protection: "center of entire station"
      best_use: "the vault (PGMs, critical spares, frozen culture backups)"
  commercial_uses:
    fuel_depot: >
      Water ice in insulated chambers. Any spacecraft refuels here.
      Water is universal propellant. Thousands of tonnes available.
    habitat: >
      Retired chamber with atmosphere, heating, and radiation shielding
      IS a space habitat. Add life support = crew-rated. Visiting
      engineers, scientists, or tourists rent a chamber.
    dry_dock: >
      Large pressurized chambers where spacecraft are repaired and
      modified in shirt-sleeve environment. No EVA needed.
    farm: >
      Pressurized, lit, warm chambers with water. Grow food with
      Chlorella vulgaris (already in species catalog). Feed visiting crews.
    foundry: >
      Thick-walled retired chambers handle high-temperature metal casting.
      Pour molten iron into molds. Manufacture structural beams and parts.
    vault: >
      PGMs, rare earths, high-value stockpiles in deepest chambers.
      Literally a bank vault in space.

equipment_lifecycle:
  description: >
    The station's iron, membrane, and biology last effectively forever.
    Only electronics and moving parts age. These are the cheapest and
    lightest components to replace via periodic CubeSat refresh missions.

  component_lifespans:
    kevlar_membrane:
      lifespan_years: "20-30 (but buried under iron by year 3, protected indefinitely)"
      failure_mode: "UV degradation, fatigue"
      replacement: "not needed (shielded by iron shell)"

    iron_walls:
      lifespan_years: "centuries"
      failure_mode: "corrosion (acid side, but deposition outpaces 3:1)"
      replacement: "self-repairing (continuous electrodeposition)"

    bacteria_culture:
      lifespan_years: "indefinite (self-replicating)"
      failure_mode: "contamination, mutation, temperature crash"
      replacement: "frozen backup samples in vault chamber"
      recovery: >
        Even if active culture dies: warm up ice, inject fresh bacteria
        (from vault or from Earth), resume processing. Like restarting
        sourdough from a dried sample.

    solar_concentrators:
      lifespan_years: "15-20"
      failure_mode: "Mylar reflectivity degradation"
      replacement: "iron-framed mirrors built on-site (reflective metal surface)"

    solar_panels:
      lifespan_years: "20-30"
      failure_mode: "radiation damage, cell degradation"
      replacement: "CubeSat delivery of new panels (~$500K)"
      note: "this is the primary aging component"

    electrowinning_cell:
      lifespan_years: "10-15"
      failure_mode: "electrode degradation"
      replacement: "new electrodes cut from extracted metals (on-site)"

    pumps:
      lifespan_years: "5-10"
      failure_mode: "seal wear, motor bearing failure"
      replacement: "CubeSat delivery of replacement pumps"

    compute:
      lifespan_years: "10-20"
      failure_mode: "radiation SEU, component aging"
      replacement: "CubeSat with new ESP32 + control board (~$500K)"

    siphuncle_seals:
      lifespan_years: "5-10 per section"
      failure_mode: "silicone degradation in acid environment"
      replacement: "2 kg silicone per seal (CubeSat delivery or on-site stockpile)"

  maintenance_schedule:
    every_5_years: "pump replacement, seal inspection"
    every_10_years: "compute refresh CubeSat ($500K)"
    every_15_years: "solar concentrator rebuild (on-site)"
    every_20_years: "solar panel replacement CubeSat ($500K)"
    annual_cost_amortized: "~$100K/year in replacement parts"
    note: "$100K/year to maintain a multi-billion-dollar facility"

  failure_recovery:
    compute_dies:
      bacteria_status: "alive for months (stable chemical system, thermal mass keeps warm)"
      recovery_time: "weeks (CubeSat transit + dock + boot)"
      recovery_cost: "$500K"
      what_to_send: "CubeSat with ESP32, solar panel, radio. Docks and takes over."

    pumps_fail:
      bacteria_status: "alive but dormant (no circulation = diffusion-limited)"
      recovery_time: "months"
      recovery_cost: "$1M"
      what_to_send: "CubeSat with replacement pumps + compute"

    total_system_failure:
      bacteria_status: "dead (temperature crashed, everything frozen)"
      structure_status: "intact (iron lasts centuries, water ice preserved)"
      recovery_time: "1-2 years (transit + reboot)"
      recovery_cost: "$1.5M"
      what_to_send: "new CubeSat seed mission with fresh bacteria and compute"
      note: >
        Station still has iron shell, water ice, sealed chambers.
        Just reseed the biology and restart. The infrastructure
        investment is permanent. Only the biology expires.

    permanent_loss: >
      Effectively impossible. Even after 50 years of neglect:
      iron shell is still there, water ice is still there, sealed
      chambers are still pressure-tight. A $1.5M CubeSat restarts
      the entire operation. The station is almost unkillable.

  frozen_culture_vault:
    description: >
      Deepest, coldest, most radiation-shielded chamber stores frozen
      culture samples of all bacterial species. Even if the active
      culture dies, the vault backups survive indefinitely in the
      near-vacuum cold conditions.
    location: "original bag (center of station)"
    samples: "all species at multiple growth stages"
    storage: "freeze-dried in sealed vials at -80C to -196C"
    redundancy: "10+ backup vials per species"
    lifetime: "decades to centuries (freeze-dried bacteria survive)"

  station_evolution:
    decade_1: "Build. Process asteroids. Grow shell. Station is a mining operation."
    decade_2: "Lease retired chambers. Fuel depot. Warehouse. Station is a business."
    decade_3: "Add habitat. Dry dock. Foundry. Farm. Station is an industrial town."
    decade_4: "Electronics aging. $500K CubeSat refresh every 5 years. Station maintains itself."
    decade_5_plus: >
      The station IS the infrastructure. Other projects build FROM it,
      not TO it. Anchor of a space economy. Effectively permanent.
      You don't abandon it. You upgrade it. $100K/year forever.

  can_you_build_forever:
    answer: "yes, for practical purposes"
    limiting_factor: "electronics and moving parts (cheapest components to replace)"
    permanent_components: "iron shell (centuries), biology (indefinite with backups), water (permanent)"
    upgrade_path: "$500K CubeSat every 5-10 years for electronics/pump refresh"
    note: >
      The iron and structure outlast everything else by orders of magnitude.
      The biology is the most resilient part -- it literally evolved to
      survive. The electronics are the most fragile -- but also the
      lightest and cheapest to replace. The architecture puts the
      permanent stuff on the outside (iron) and the replaceable stuff
      on the inside (electronics, pumps). Like a turtle: hard shell,
      soft insides that heal.

notes: |
  The Sous Vide approach inverts the problem. Instead of building
  infrastructure INSIDE the asteroid (tunnels, rails, seals), it builds
  infrastructure AROUND the asteroid (membrane, concentrators) and lets
  biology do the extraction.

  It's heap leaching -- the most productive mining technique on Earth --
  adapted for space. The asteroid is already crushed into rubble (nature
  did the grinding). The water is already there (8% ice on C-types).
  The minerals are already exposed (57% porosity = massive surface area).
  We just add warmth, bacteria, and time.

  REUSABILITY is the killer feature. After the first asteroid:
  - Bacteria self-replicate (save a sample, reseed next target)
  - Water accumulates (50 tonnes per C-type, carry to next)
  - Acid self-generates (bacteria produce it)
  - Nutrients self-produce (mining output IS the nutrient)
  - Only xenon and nitrogen deplete (cheap to resupply)

  The supply chain builds on itself. Each asteroid makes the next
  one easier. C-types provide water for S-type campaigns. Bacteria
  get better at asteroid mining with each generation. The membrane
  hops between targets like a reusable space factory.

  This could be the Phase 0 mission: prove bioleaching works on real
  asteroid material, build a metal stockpile at a convenient orbit,
  and pay for the Starship tunnel-mining mission with the profits.

  Effective cost after initial investment: $50-100K per asteroid
  (mobile variant). Pac-Man variant: $0 per asteroid after setup.
  That's cheaper than any mining operation in human history.

# === PAC-MAN VARIANT (Stationary Refinery) ===
# The final evolved form: a permanent processing station that
# eats asteroids fed to it by water-powered delivery tugs.

pac_man:
  description: >
    Instead of moving the bag to each asteroid, keep the bag
    stationary and bring asteroids TO it. Two-bag airlock design:
    Bag A (processing) never opens to vacuum. Bag B (airlock)
    receives new asteroids from water-powered tugs.

  architecture:
    bag_a_processing:
      role: "Permanent bioreactor. Never opens to vacuum."
      contents: "warm water + active bacteria + current asteroid"
      state: "always sealed, always pressurized, always warm"
      note: "Bacteria culture runs continuously for years"
    bag_b_airlock:
      role: "Receives new asteroids, equalizes pressure"
      area_m2: 200
      mass_kg: 47
      cycle: "open -> receive asteroid -> close -> pressurize -> transfer to A"
    connecting_tube:
      role: "Sealable passage between A and B"
      diameter_m: 3                  # Wide enough for 10m asteroid chunks
      gate_type: "inflatable iris or drawstring closure"
      mass_kg: 15

  cycle:
    step_1: "Tug pushes new asteroid into Bag B (open to vacuum)"
    step_2: "Close Bag B drawstring mouth"
    step_3: "Pump O2/CO2 from Bag A to equalize pressure in B"
    step_4: "Open connecting tube gate"
    step_5: "Tug nudges asteroid from B into A"
    step_6: "Close gate. Bag A processes (already has warm water + bacteria)"
    step_7: "While A processes: Bag B opens, dumps spent rubble, receives next delivery"
    step_8: "Repeat. Processing bag NEVER opens. Culture NEVER interrupted."
    time_per_cycle_days: 120-180     # Depending on asteroid size and composition

  water_powered_tugs:
    description: >
      Small delivery vehicles that fetch nearby asteroids and push
      them to the station. Powered by water from previous asteroids.
      No xenon, no Earth resupply. Water is free and abundant.
    count: 2-4
    per_tug:
      mass_kg: 120
      thruster: "electrothermal arcjet (water propellant)"
      isp_s: 800
      thrust_n: 0.5
      water_per_delivery_kg: 800     # For 10 m/s dv on 628-tonne asteroid
      water_source: "previous asteroid (50 tonnes available)"
      power_w: 500
      solar_panel_m2: 2
      anchor: "4 screw anchors (dock to asteroid surface)"
      range_km: 500                  # Practical radius for fetching
      transit_days: 7-30             # Depends on distance and dv
      cost_usd: "2-5M each"
    heritage: "Momentus water plasma thruster (flight proven, TRL 5-6)"

  station_mass_budget:
    bag_a_processing: 94
    bag_b_airlock: 47
    connecting_tube_and_gate: 15
    mothership_core: 310             # Everything minus propulsion and membrane
    tug_1: 120
    tug_2: 120
    initial_water_propellant_kg: 1600  # Enough for 2 deliveries before first asteroid provides water
    initial_nitrogen_fill_kg: 59
    nitrogen_tanks_kg: 18
    total_kg: 943
    note: "Under 1 tonne. Single Falcon 9 rideshare."

  throughput:
    asteroids_per_year: 4-6          # No reheating, no reseeding, no downtime
    metals_per_year_tonnes: 30-45    # High-value metals (Ni, Cu, Co, PGMs)
    water_surplus_per_year_tonnes: 180-250  # Net water gain after propulsion use

  advantages_over_mobile:
    - "Membrane NEVER folds (eliminates wear)"
    - "Processing bag NEVER opens (bacteria culture continuous)"
    - "No mothership propulsion (station is stationary)"
    - "No reheating (bag stays warm between asteroids)"
    - "No reseeding (bacteria already active)"
    - "Higher throughput (4-6/year vs 1-2/year)"
    - "Water propellant is FREE (from previous asteroids)"
    - "Xenon eliminated entirely"
    - "Nitrogen eliminated (O2/CO2 from asteroid water + regolith)"

  self_sustainability:
    from_earth_after_setup: "NOTHING"
    water: "each asteroid adds 50 tonnes, tugs use 0.8 tonnes"
    bacteria: "continuous culture, never interrupted, improves over time"
    energy: "solar (permanent panels + concentrators)"
    metals: "accumulate continuously"
    propellant: "water from processing"
    pressurization: "O2/CO2 from electrolysis and regolith heating"
    maintenance: "4 surface ants handle membrane patches and tug servicing"
    limiting_factor: "electronics aging and membrane degradation (years)"

  # === NAUTILUS GROWTH (Long-Term Station Evolution) ===
  nautilus_growth:
    description: >
      The station grows an exoskeleton from extracted metals, then expands
      outward like a nautilus shell. Each new chamber is larger, specialized,
      and shares walls with its neighbors. The original processing bag
      becomes the innermost protected chamber -- the "heart."

    engineering_risks:
      thermal_fatigue:
        severity: "HIGH"
        description: >
          Thermal cycling (+120C to -150C in LEO, less extreme in deep space)
          gradually cracks welds. ISS Service Module has leaked 5 years from this.
          Iron is more brittle at low temps than aluminum.
        mitigation: "MLI insulation (reduces swing to +/-30C) + deep space location (slower cycling)"
      weld_quality:
        severity: "HIGH"
        description: >
          Every pressure vessel weld is a potential catastrophic failure.
          Can't X-ray in vacuum. Quality verification is the hardest problem.
        mitigation: >
          Friction stir welding (proven on meteorite iron, solid-state, high quality).
          Automated ultrasonic inspection by surface ants.
          Non-critical structures first, pressure vessels only after proven.
      alloy_variation:
        severity: "MODERATE"
        description: "Different asteroids = different iron composition = inconsistent welds"
        mitigation: "Sort by source. Same-batch for pressure walls. Mixed OK for armor."
      center_of_mass:
        severity: "LOW"
        description: "Asymmetric growth shifts CoM, complicates attitude control"
        mitigation: "Nautilus spiral keeps CoM near center. Symmetric chamber placement."

    growth_phases:
      year_0_2:
        name: "The Seed"
        structure: "processing bag + iron armor shell"
        mass_tonnes: 200
        capabilities: "bioleaching, electro-winning, water depot"
      year_3_4:
        name: "First Iron Chamber"
        structure: "welded iron pressure vessel attached to shell"
        new_chamber: "Storage (sorted metal stockpile)"
        wall_thickness_mm: 5
        test_case: true
        note: "Small chamber, prove welding and pressure integrity before scaling"
      year_5_7:
        name: "Multi-Chamber Station"
        new_chambers: ["Manufacturing (forge, welder)", "Water depot (insulated)", "Docking frame"]
        mass_tonnes: 500-1000
        capabilities: "processing + storage + manufacturing + visiting ship berth"
      year_10_plus:
        name: "Industrial Platform"
        new_chambers: ["Fabrication (assembly)", "Energy (expanded solar)", "Additional processing"]
        mass_tonnes: 2000+
        capabilities: "full in-space manufacturing, materials depot, fuel station"
        note: >
          At this point the station is a permanent space industrial facility.
          The original 94 kg membrane bag is the protected core of a
          multi-thousand-tonne structure built entirely from asteroid materials.

    chamber_specs:
      processing: {built: "year 0", material: "membrane + iron armor", pressure_kpa: 50, temp_c: 30, function: "bioreactor core"}
      storage: {built: "year 3", material: "welded iron 5mm", pressure_kpa: 0, temp_c: "ambient", function: "sorted metal stockpile"}
      water: {built: "year 4", material: "welded iron insulated", pressure_kpa: 10, temp_c: 5, function: "ice reservoir + propellant"}
      manufacturing: {built: "year 6", material: "welded iron 8mm", pressure_kpa: 50, temp_c: 20, function: "forge, welder, 3D printer"}
      fabrication: {built: "year 8", material: "welded iron 10mm", pressure_kpa: 50, temp_c: 20, function: "assembly of products"}
      docking: {built: "year 5", material: "iron frame", pressure_kpa: 0, function: "visiting spacecraft berth"}

    farm_table:
      description: >
        Exterior surface organized as self-service materials depot.
        Visiting spacecraft dock, surface ants load requested materials.
        Like a drive-through warehouse. Metered and priced.
      zones:
        iron: "structural tiles, I-beams, plate stock, powder"
        nickel: "corrosion-resistant plate, alloy ingots"
        copper: "wire coils, bus bars, sheet"
        cobalt: "battery-grade ingots"
        pgm: "sealed containers (highest security zone)"
        water: "insulated ice blocks + liquid for refueling"

    # === TRUE NAUTILUS ARCHITECTURE (corrected) ===
    # The processing zone MIGRATES OUTWARD like a real nautilus animal.
    # The animal lives in the outermost chamber only. Old chambers are
    # sealed, inert, permanent. This solves both the feeding problem
    # and the acid corrosion problem.

    true_nautilus:
      principle: >
        A real nautilus lives in its OUTERMOST chamber. When it outgrows
        it, it seals the old one (becomes buoyancy tank) and builds a
        new larger one at the leading edge. Our station works the same:
        the active bioreactor is always the outermost chamber. Inner
        chambers are sealed, inert, dry storage.

      why_this_solves_feeding: >
        New asteroids always enter from the EXTERIOR of the station
        directly into the outermost (active) chamber. The feed port
        is never buried under layers of shell. The airlock is always
        on the outside face.

      why_this_solves_corrosion: >
        The acidic soup (pH 2.0 H2SO4) is ONLY in the outermost chamber.
        Inner chambers are sealed with iron bulkheads + silicone gaskets.
        Acid never touches the inner structure. The active chamber is
        lined with glass-ceramic (sintered from asteroid silicates),
        which is virtually immune to sulfuric acid.

      glass_ceramic_liner:
        description: >
          Instead of shipping Kapton liner from Earth, sinter the inner
          surface of each new iron chamber with regolith silicates at
          1100C using the microwave emitter. Glass-lined steel is a
          200-year-old industrial technique for acid-resistant tanks.
        material: "asteroid regolith silicates (50%+ of mass)"
        process: "coat iron wall with silicate powder -> microwave sinter -> glass"
        sintering_time_hours: 400    # 400 m^2 at 1 m^2/hr
        acid_resistance: "excellent (glass is virtually immune to H2SO4 at pH 2)"
        source: "asteroid (FREE, unlimited)"
        from_earth: false

      scoop_lid_capture:
        description: >
          Each new chamber is built as an open-sided shell (U-shape).
          The tug pushes the asteroid into the open side. Surface ants
          weld a pre-fabricated iron lid shut. Solution from the previous
          chamber is pumped in. No separate airlock needed -- the new
          chamber IS the capture mechanism.
        mechanism:
          step_1: "Build new chamber walls as U-shape (open on one side), glass-lined"
          step_2: "Pre-fabricate lid plate (iron + glass inner face)"
          step_3: "Tug pushes asteroid into U-shape (can be bigger or multiple!)"
          step_4: "Surface ants slide lid into place, weld seams shut"
          step_5: "Gasket seal around rim (2 kg silicone)"
          step_6: "Open transfer port to previous chamber"
          step_7: "Pump acid + bacteria solution from old to new chamber"
          step_8: "Solar concentrators warm the new chamber"
          step_9: "Processing begins. Old chamber drained, sealed, becomes storage."
        advantages:
          - "No separate airlock bag (saves 47 kg membrane)"
          - "Can capture BIGGER asteroids each generation (chamber grows)"
          - "Can batch multiple smaller asteroids in one load"
          - "Simpler than airlock+tube+gate (one wall, one weld)"
          - "Funnel shape guides asteroid even with imprecise tug aim"
        exponential_growth:
          description: >
            Each generation produces more iron, enabling bigger walls,
            capturing bigger asteroids, producing even more iron.
            This is the von Neumann growth pattern.
          gen_1: {year: "0-3", chamber_m: 10, asteroid_m: 10, mass_t: 628, iron_out_t: 107}
          gen_2: {year: "3-6", chamber_m: 12, asteroid_m: 12, mass_t: 1085, iron_out_t: 184}
          gen_3: {year: "6-9", chamber_m: 15, asteroid_m: 15, mass_t: 2121, iron_out_t: 360}
          gen_4: {year: "9-12", chamber_m: 18, asteroid_m: 18, mass_t: 3663, iron_out_t: 623}
          gen_5: {year: "12-15", chamber_m: 22, asteroid_m: 22, mass_t: 6683, iron_out_t: 1136}
          gen_6: {year: "15-18", chamber_m: 26, asteroid_m: 26, mass_t: 11037, iron_out_t: 1876}
          note: >
            By generation 6 (year 18), processing 11,000 tonnes per cycle
            vs 628 tonnes at start. 17x growth. Water ratio stays constant
            (~1.6% consumed by tugs) so scaling is self-funding.

      chamber_lifecycle:
        born: >
          Built as new outermost processing chamber.
          Iron walls from extracted stockpile. Glass-ceramic inner lining.
          Airlock relocated to exterior face. Fresh, acid-resistant.
        active: >
          Years 0-3: Processing asteroids. Hot, acidic, full of bacteria.
          Glass liner protects iron walls from acid dissolution.
          Electro-winning extracts metals from solution.
        retired: >
          Glass liner degraded after ~3 years. Drain acid. Seal bulkhead
          (iron plate + 2 kg silicone gasket). Chamber becomes inert dry
          storage. New chamber built outward takes over processing.
        forever: >
          Sealed, inert, structural. Stores sorted metals.
          Customers take from exterior face of most-recently-retired chamber.
          Station restocks from active chamber production.

      # === BIOLOGICAL GROWTH MODEL (replaces discrete construction) ===
      biological_growth:
        principle: >
          A nautilus doesn't build chambers. It GROWS them. The mantle
          secretes nacre onto the inner shell surface continuously.
          Food enters through the aperture (mouth). The shell extends
          at the leading edge. Our station works the same way.

        electrodeposition:
          description: >
            The acid solution electrodeposits iron directly onto the
            chamber walls from inside. The walls thicken and extend
            continuously, 24/7. No welding. No construction events.
            The solution grows the shell itself.
          mechanism: "chamber walls = cathode, sacrificial iron anode dissolves"
          rate_kg_per_day: 50
          quality: "dense, uniform, well-bonded to existing surface"
          note: "Same process as electro-winning, just plating onto walls instead of cathode blanks"

        aperture_membrane:
          description: >
            The active chamber is open-ended with a flexible Kapton
            flap at the aperture -- the space equivalent of the
            nautilus' hood. Food (asteroids) enters through the mouth.
            The shell grows AROUND the mouth.
          material: "Kapton membrane flap, ~10-15 m^2"
          seal_method: "magnetic latches or mechanical clips (quick-release)"
          feeding_cycle:
            digest: "weeks/months: sealed, pressurized, bacteria working, iron depositing"
            drain: "hours: pump solution to siphuncle (temporary storage)"
            open: "minutes: ants unlatch aperture flap"
            feed: "hours: tug pushes asteroid through aperture"
            close: "minutes: ants relatch flap"
            fill: "hours: pump solution back from siphuncle"
            resume: "bacteria immediately start on new rock (never died)"

        siphuncle:
          description: >
            Central utility conduit running through ALL bulkheads from
            core to aperture. The nautilus' siphuncle controls fluid/gas
            in every sealed chamber. Ours carries solution, power, data,
            gas, and temperature sensing through the entire station.
          carries:
            - "Solution transfer lines (drain/fill during feeding)"
            - "Power cables (solar to all systems)"
            - "Data cables (sensors in every chamber)"
            - "Gas lines (pressure management)"
            - "Temperature probes (every chamber)"
          enables:
            - "Drain active chamber without losing solution (feeding cycle)"
            - "Monitor structural health of all chambers from core"
            - "Temperature control in sealed chambers"
            - "Access stored materials without opening bulkheads"
            - "Leak detection anywhere in station"
          penetration: "sealed O-ring + compression fitting through each bulkhead"

        space_nacre:
          description: >
            Alternating layers of electrodeposited iron + sintered
            glass-ceramic. Like biological nacre (95% aragonite + 5%
            organic protein = 3000x tougher than pure mineral).
          acid_contact: >
            The innermost iron surface IS in contact with the acid.
            The acid corrodes it at ~1 mm/year. But electrodeposition
            replates at ~2.9 mm/year. Net growth: +1.9 mm/year.
            The deposition IS the protection. Same as a real nautilus:
            the ocean dissolves the shell, but nacre secretion outpaces it.
          glass_role: >
            NOT an acid barrier. Glass-ceramic layers are EMBEDDED
            between iron layers as structural reinforcement. They
            arrest crack propagation (why nacre is 3000x tougher).
            Deposited periodically: 2 weeks iron -> sinter glass -> repeat.
          layers: "iron (0.1mm) -> glass (thin) -> iron -> glass -> ..."
          corrosion_rate_mm_per_year: 1.0
          deposition_rate_mm_per_year: 2.9
          net_growth_mm_per_year: 1.9
          strength: "composite tougher than either material alone"
          heritage: "Damascus steel, biological nacre, laminated armor"

        continuous_growth:
          description: >
            The chamber GROWS, not built in events. Walls extend via
            electrodeposition. Aperture migrates outward. Each cycle
            the chamber is slightly bigger (can eat bigger asteroids).
            Septum sealed only when growth zone needs refreshing.
          growth_rate: "walls extend ~1mm/week in thickness + outward growth"
          septum_trigger: "glass liner degraded OR chamber outgrown (~3 years)"

      consumables_per_generation:
        glass_liner: {amount: "sintered incrementally during growth", source: "asteroid silicates", from_earth: false}
        iron_walls: {amount: "grown via electrodeposition from solution", source: "dissolved asteroid iron", from_earth: false}
        silicone_gasket: {amount: "2 kg per septum", source: "Earth", from_earth: true}
        aperture_membrane: {amount: "small Kapton flap, ~2 kg", source: "Earth initially, potentially local long-term", from_earth: true}

      consumables_over_20_years:
        from_earth: "~26 kg total (14 kg gasket + 12 kg aperture flaps)"
        from_asteroids: "everything else"
        note: "26 kg from Earth over 20 years for a 50,000-tonne facility."

    what_it_becomes:
      year_0: "a bag with bacteria"
      year_2: "an armored processing station"
      year_5: "a materials depot with docking"
      year_10: "an industrial platform"
      year_20: "the seed of a city"
      note: >
        From 94 kg of membrane to a multi-thousand-tonne facility.
        The original bag is sealed at the center -- the station's heart.
        The active bioreactor is always the outermost chamber.
        Old chambers are sealed, inert, stacked like tree rings.
        14 kg of silicone gaskets is the only Earth supply in 20 years.

  economics:
    setup_cost_usd: "10-20M (launch + hardware)"
    per_asteroid_cost_after_setup: "$0 (self-sustaining)"
    revenue_per_asteroid_at_lunar_orbit:
      nickel_7300kg_at_50k_per_tonne: "$365K"
      cobalt_267kg_at_80_per_kg: "$21K"
      pgm_15kg_at_30k_per_kg: "$450K"
      total_per_asteroid: "~$836K"
    revenue_per_year_4_asteroids: "~$3.3M"
    payback_period: "3-6 years (then pure profit)"
    note: >
      These are conservative Earth-market prices. In-space prices
      (water, metals for construction) would be orders of magnitude
      higher. 50 tonnes of water at $10K/kg in-space = $500M per
      asteroid just in water value.
