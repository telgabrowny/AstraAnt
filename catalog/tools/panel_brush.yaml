id: panel_brush
name: "Solar Panel Brush"
type: maintenance_tool
description: >
  Soft anti-static bristle brush for cleaning dust off mothership solar
  panels. Surface ant tool — designed for exterior vacuum use. The
  bristles are conductive carbon fiber to prevent electrostatic dust
  re-adhesion (the main failure mode for dust removal in vacuum).

physical:
  total_mass_g: 8
  total_length_mm: 45
  mount_interface:
    type: magnetic_clip
    width_mm: 20                 # Wider mount for surface ant mandibles
    depth_mm: 12
    magnet_recess_mm: 6
  body:
    shape: brush_handle
    length_mm: 20
    diameter_mm: 12
    material: "aluminum (vacuum compatible)"
  brush_head:
    width_mm: 30
    bristle_length_mm: 15
    bristle_material: "carbon fiber (conductive, anti-static)"
    bristle_count: ~200
    note: "Carbon fiber bristles conduct charge to grounded handle, preventing re-deposition"

electrical:
  connector: none                # Passive, but brush must be grounded
  grounding: "handle is metal — connects to ant's chassis which is grounded"

operation:
  coverage_per_stroke_cm2: 30
  strokes_per_panel_cleaning: 200
  time_per_panel_minutes: 15
  cleaning_effectiveness: 0.95   # Removes 95% of settled dust per cleaning

printable:
  stl_available: true            # Handle only — bristles are purchased
  openscad_parametric: true
  print_material: "Aluminum handle (machined) or PETG for sandbox testing"
  print_time_hours: 0.5
  additional_parts:
    - "Carbon fiber bristle strip (purchased, e.g., ESD brush from Amazon)"
    - "Epoxy to bond bristles into handle channel"

cost_usd: 6                      # Handle + carbon fiber bristle strip
added_date: "2026-03-27"
