  composition_notes: >
    Composition is entirely inferred from spectral classification (C-type)
    and comparison with meteorite analogs. The 3-micron absorption feature
    in infrared spectroscopy suggests hydrated minerals. No sample return
    or close-approach mission data exists. All bulk percentages are rough
    estimates based on CI/CM chondrite averages and should be treated as
    uncertain. Was a candidate target for NASA's Asteroid Redirect Mission
    (ARM, cancelled 2017) and has been identified by multiple studies as
    a high-priority target for asteroid mining due to exceptional
    accessibility.

mining_relevance:
  accessibility:
    delta_v_from_leo_km_per_s: 4.5
    estimated_transit_days_solar_sail: 500
    launch_windows_per_year: 2
    synodic_period_years: 16.0  # near 1:1 resonance with Earth
    note: "One of the most accessible asteroids known — very low delta-v, frequent launch windows"
  value_assessment: >
    2008 EV5 is one of the highest-priority targets for asteroid mining due
    to its exceptional orbital accessibility. At delta-v of only 4.5 km/s
    from LEO, it is among the easiest asteroids to reach in the entire NEA
    population. Its near-Earth orbit (semi-major axis 0.958 AU) means short
    transit times and frequent launch opportunities. Spectral evidence for
    hydrated minerals suggests 3-5% water content, making it attractive for
    in-situ propellant production. The C-type classification implies
    carbonaceous chondrite composition with useful volatiles and metals.
    However, composition confidence is LOW — no mission has visited this
    asteroid. It was selected as the target for the cancelled ARM mission,
    which would have provided detailed characterization. An excellent
    candidate for an early prospecting/sample-return mission to validate
    mining potential. The spinning-top rubble pile structure (similar to
    Bennu and Ryugu) would facilitate regolith collection.
  water_availability: true
  regolith_type: "rubble_pile"
  estimated_total_water_kg: 2.0e9
  key_resources:
    - resource: "water"
      abundance: "moderate"
      extraction_method: "thermal desorption of hydrated minerals"
    - resource: "carbon/organics"
      abundance: "low_to_moderate"
      extraction_method: "pyrolysis"
    - resource: "iron"
