notes: >
  2008 EV5 is an Aten-class asteroid with a semi-major axis slightly less
  than 1 AU, making it one of the most accessible NEAs. Radar observations
  by Arecibo and Goldstone in 2008 revealed a spinning-top shape similar
  to Bennu and Ryugu, with a prominent equatorial ridge and an estimated
  400m diameter. A concavity on one side may indicate a large impact crater.
  The asteroid was the leading candidate target for NASA's Asteroid Redirect
  Mission (ARM) before that program was cancelled in 2017. Multiple asteroid
  mining companies (Planetary Resources, Deep Space Industries) identified
  2008 EV5 as a high-value target. The near-1:1 orbital resonance with
  Earth means the synodic period is very long (~16 years), but the similar
  orbit provides frequent low-energy transfer opportunities. Its rapid
  rotation (3.7 hours) is near but below the spin-barrier limit for rubble
  piles (~2.2 hours), consistent with a cohesionless aggregate structure.

