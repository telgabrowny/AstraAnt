  value_assessment: >
    Excellent ISRU target with well-characterized composition from Hayabusa2
    sample return. Similar to Bennu but larger (900m vs 500m), providing
    significantly more total material. Water content (5%) lower than Bennu
    but total water mass is higher due to larger size. Rich organic chemistry
    including amino acids makes it scientifically invaluable. Carbon content
    useful for life support and material synthesis. Slightly better delta-v
    than Bennu (4.7 vs 5.0 km/s) improves accessibility. Rubble pile
    structure facilitates regolith collection.
