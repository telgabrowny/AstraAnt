notes: >
  Ryugu was explored by JAXA's Hayabusa2 mission from June 2018 to
  November 2019. The spacecraft collected 5.4g of surface and subsurface
  samples returned to Earth in December 2020. Analysis revealed CI
  chondrite-like composition with abundant hydrated minerals, carbonates,
  and a rich inventory of organic molecules including amino acids and the
  nucleobase uracil. The spinning-top shape (equatorial ridge) is common
  among small rubble pile asteroids and results from YORP spin-up. Surface
  is covered in boulders with very few smooth areas, similar to Bennu.
  Ryugu likely formed from the breakup of a larger, water-rich parent body.

