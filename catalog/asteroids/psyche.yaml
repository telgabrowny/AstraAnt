  - "NASA JPL Small-Body Database: https://ssd.jpl.nasa.gov/tools/sbdb_lookup.html#/?sstr=psyche"

notes: >
  Psyche is hypothesized to be the exposed iron-nickel core of a
  protoplanet that was stripped of its rocky mantle by collisions during
  the early solar system. If confirmed, it would be the only known example
  of a planetary core accessible for direct study. However, recent density
  estimates (~3780 kg/m3) are lower than expected for solid metal (~7800
  kg/m3), suggesting either high porosity, significant silicate content,
  or both. The NASA Psyche spacecraft launched October 13, 2023, performed
  a Mars gravity assist in May 2026, and is expected to arrive at the
  asteroid in August 2029 for a 26-month orbital investigation. The mission
  carries a magnetometer, multispectral imager, gamma-ray/neutron
  spectrometer, and a Deep Space Optical Communications (DSOC) technology
  demonstrator. Until mission data arrives, all composition estimates should
  be considered preliminary. Psyche is by far the largest M-type asteroid
  and the 14th largest main belt asteroid overall.

