  composition_notes: >
    Psyche's composition is inferred from radar albedo (very high, consistent
    with metal), thermal inertia, density, and spectral data. Recent studies
    suggest it may not be purely metallic but rather a mixture of metal and
    silicates (30-60% metal by volume). The NASA Psyche mission arriving in
    2029 will provide definitive answers. All bulk percentages are estimates
    and should be treated as highly uncertain until mission data is available.

mining_relevance:
  accessibility:
    delta_v_from_leo_km_per_s: 9.4
    estimated_transit_days_solar_sail: 2500
    launch_windows_per_year: 1
    synodic_period_years: 1.3
    note: "Main belt location makes Psyche much harder to reach than NEAs"
  value_assessment: >
    Psyche is potentially the most valuable single object in the solar system
    for metal extraction. If composition estimates are correct, it contains
    approximately 1.1e16 kg of iron-nickel metal — enough iron to supply
    Earth's needs for millions of years. Theoretical total metal value has
    been estimated at $10,000 quadrillion, though this is economically
    meaningless (market saturation). The real value is as an orbital
    construction material source for large-scale space infrastructure.
    However, its main belt location (2.9 AU, delta-v ~9.4 km/s) makes it
    extremely expensive to reach compared to NEAs. Surface gravity of 0.06
    m/s2 is substantial enough for meaningful surface operations. Not a
    realistic early mining target but potentially transformative for
    long-term space industrialization. Awaiting Psyche mission data (2029)
    for definitive composition assessment.
  water_availability: false
  regolith_type: "unknown"
  estimated_metal_mass_kg: 1.1e16
  key_resources:
    - resource: "iron-nickel metal"
      abundance: "extreme"
      extraction_method: "unknown — depends on surface conditions; possibly direct cutting/excavation of metallic surface"
    - resource: "platinum group metals"
      abundance: "potentially_significant"
      extraction_method: "co-extracted with bulk iron-nickel; requires refining"
    - resource: "cobalt"
      abundance: "high"
      extraction_method: "co-extracted with iron-nickel"
    - resource: "gold"
      abundance: "trace"
      extraction_method: "concentrated in metal phase"

