  value_assessment: >
    Extremely well-characterized thanks to OSIRIS-REx sample return.
    Primary value is water (8% by mass in hydrated minerals) for propellant
    production (ISRU). Carbon and organics useful for life support.
    Modest metal content (iron, nickel) but not a primary metal target.
    Rubble pile structure means easy regolith collection but challenging
    anchoring. Excellent pathfinder target due to high-confidence composition data.
