notes: >
  Bennu is the best-characterized asteroid in existence thanks to the
  OSIRIS-REx mission, which orbited from December 2018 to May 2021 and
  returned a 121.6g sample in September 2023. Sample analysis confirmed
  abundant hydrated minerals, organics including amino acids, and magnetite.
  Bennu is also a potentially hazardous asteroid with a cumulative 1-in-2700
  chance of Earth impact between 2178-2290. The rubble pile structure with
  very low cohesion (surface particles loosely bound) means regolith
  collection is straightforward but spacecraft anchoring requires care.
  Surface is extremely rough with large boulders, complicating landing
  site selection.

