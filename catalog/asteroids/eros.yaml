notes: >
  Eros was the first asteroid to be orbited by a spacecraft (NEAR Shoemaker,
  2000-2001) and the first on which a spacecraft landed (February 12, 2001).
  It is an S-type asteroid with ordinary chondrite composition, similar to
  Itokawa but vastly larger. The elongated shape creates a complex gravity
  field where surface gravity varies significantly (from ~0.002 to ~0.006
  m/s2). The surface shows a thick regolith layer with degraded craters,
  large boulders, and a distinctive system of grooves/ridges suggesting
  internal fractures. Unlike Bennu and Ryugu, Eros is not a rubble pile;
  it is a single coherent but fractured body. The Himeros depression (~10 km
  across) dominates one end. Eros was the first known near-Earth asteroid,
  discovered in 1898, and its close approaches to Earth were historically
  used to measure the astronomical unit.

