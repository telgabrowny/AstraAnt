    differentiation. Gamma-ray spectrometer confirmed chondritic Fe, Si, K
    abundances.

mining_relevance:
  accessibility:
    delta_v_from_leo_km_per_s: 5.6
    estimated_transit_days_solar_sail: 900
    launch_windows_per_year: 1
    synodic_period_years: 2.3
  value_assessment: >
    Eros is one of the largest near-Earth asteroids and contains an enormous
    quantity of material. At 6.687e15 kg, even modest metal fractions represent
    colossal resource volumes: approximately 1.3e12 kg of iron-nickel metal
    and potentially 170 tonnes of platinum group metals. However, the higher
    delta-v (5.6 km/s) makes it more expensive to reach than smaller NEAs.
    The monolithic/fractured structure (not rubble pile) means mining would
    require drilling or blasting rather than simple regolith scooping. Surface
    gravity of 0.006 m/s2 is enough for a person to walk very slowly, enabling
    surface operations with anchoring. No water means no in-situ propellant
    production. Best suited for large-scale industrial mining operations rather
    than early prospecting missions.
  water_availability: false
  regolith_type: "monolithic_fractured"
  estimated_metal_mass_kg: 1.3e12
  key_resources:
    - resource: "iron-nickel metal"
      abundance: "very_high"
      extraction_method: "drilling/blasting of consolidated material; magnetic separation"
    - resource: "platinum group metals"
      abundance: "low"
      extraction_method: "concentrated in metal phase; requires refining infrastructure"
    - resource: "silicates (construction)"
      abundance: "very_high"
      extraction_method: "sintering regolith for large-scale construction"

