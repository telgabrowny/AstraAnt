  value_assessment: >
    Well-characterized S-type asteroid with LL chondrite composition confirmed
    by Hayabusa sample return. Primary value is in metals: iron-nickel alloy
    grains (~8% bulk) with trace platinum group metals. No water content makes
    it unsuitable for propellant ISRU. The elongated bilobate shape suggests
    two bodies in contact, with a distinct neck region (the "Muses Sea" smooth
    area). Low delta-v (4.6 km/s) makes it one of the most accessible NEAs.
    Good target for metal extraction technology demonstration but lacks the
    water resources needed for sustained operations.
  water_availability: false
  regolith_type: "rubble_pile"
  key_resources:
    - resource: "iron-nickel metal"
      abundance: "moderate"
      extraction_method: "magnetic separation from regolith grains"
    - resource: "platinum group metals"
      abundance: "trace"
      extraction_method: "concentrated in metal phase; acid leaching after magnetic separation"
    - resource: "silicates (construction)"
      abundance: "high"
      extraction_method: "sintering regolith for structural materials"

