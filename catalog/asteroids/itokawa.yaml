notes: >
  Itokawa was the first asteroid from which samples were returned to Earth
  (Hayabusa mission, JAXA, 2010). Despite severe spacecraft malfunctions
  during the mission, approximately 1500 microscopic grains were recovered.
  Analysis confirmed S-type asteroids are the parent bodies of LL ordinary
  chondrite meteorites, resolving a long-standing debate. The asteroid has
  a distinctive bilobate "sea otter" shape with a smooth region (Muses Sea)
  between two rougher lobes. Internal structure is highly porous (~40%
  porosity) consistent with a rubble pile formed from catastrophic disruption
  and gravitational reaccumulation. Surface gravity is extremely low, making
  operations challenging. The high albedo (0.53) is typical of S-type asteroids
  with fresh silicate surfaces.

