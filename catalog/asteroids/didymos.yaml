notes: >
  Didymos is a binary near-Earth asteroid system consisting of the ~780m
  primary (Didymos) and its ~151m moonlet Dimorphos. The system was the
  target of NASA's Double Asteroid Redirection Test (DART), which
  deliberately impacted Dimorphos on September 26, 2022 at 6.1 km/s.
  The impact shortened Dimorphos's orbital period around Didymos by 33
  minutes (from 11h 55m to 11h 23m), demonstrating the viability of
  kinetic impactor planetary defense. The momentum transfer efficiency
  (beta = 3.6) was much higher than expected, indicating the rubble pile
  structure ejected significant mass that enhanced the orbital change.
  ESA's Hera mission launched in October 2024 and will arrive at the
  Didymos system in December 2026 to conduct detailed follow-up
  investigations including mass measurement, crater characterization,
  and internal structure assessment using radar. Didymos itself rotates
  extremely rapidly (2.26 hours), very near the theoretical spin barrier
  for rubble piles, suggesting it shed material that formed Dimorphos.
  The primary's spinning-top shape with equatorial ridge is consistent
  with this YORP-driven formation scenario.

