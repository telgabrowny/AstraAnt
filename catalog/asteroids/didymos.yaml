    ejecta_observations: >
      Hubble, JWST, and ground telescopes observed extensive ejecta plume.
      LICIACube cubesat imaged ejecta cone 3 minutes post-impact. Ejecta
      evolved into comet-like tail lasting weeks. Boulder-sized fragments
      observed. Ejecta spectroscopy consistent with ordinary chondrite
      silicates — no significant volatile release detected.

mining_relevance:
  accessibility:
    delta_v_from_leo_km_per_s: 5.1
    estimated_transit_days_solar_sail: 800
    launch_windows_per_year: 1
    synodic_period_years: 1.9
  value_assessment: >
    Didymos is interesting for mining primarily because of its binary nature.
    The DART impact demonstrated that kinetic impactors can efficiently
    modify asteroid orbits (beta = 3.6), relevant for mining operations
    that might need to redirect material. The binary system provides a
    natural laboratory for understanding rubble pile cohesion and ejecta
    dynamics. Dimorphos (~150m) is small enough to be a realistic early
    mining target if composition proves favorable. The DART ejecta plume
    excavated subsurface material, providing a preview of mining yields.
    S-type composition means metal content (iron-nickel, trace PGMs) but
    no water for ISRU. ESA's Hera mission arrives December 2026 and will
    provide detailed characterization of both bodies, significantly
    improving composition confidence. Moderate delta-v (5.1 km/s) is
    acceptable but not exceptional.
  water_availability: false
  regolith_type: "rubble_pile"
  key_resources:
    - resource: "iron-nickel metal"
      abundance: "moderate"
      extraction_method: "magnetic separation from regolith"
    - resource: "platinum group metals"
      abundance: "trace"
      extraction_method: "acid leaching of metal phase"
    - resource: "silicates (construction)"
      abundance: "high"
      extraction_method: "regolith sintering"
  binary_mining_advantages:
