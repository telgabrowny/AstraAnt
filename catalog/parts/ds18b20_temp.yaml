notes: |
  The DS18B20 is the simplest and most reliable digital temperature sensor available.
  The 1-Wire interface requires only a single GPIO pin plus a 4.7k pull-up resistor,
  and multiple sensors can share the same bus (each has a unique 64-bit address).
  This makes it trivial to add dozens of temperature monitoring points.

  For the AstraAnt, temperature monitoring is critical for:
  - Battery thermal management (Li-ion cells must stay 0-45C for charging)
  - Motor/actuator thermal limits
  - Electronics thermal monitoring
  - Bioreactor temperature control (for bioleaching species)

  The parasitic power mode is useful for reducing wiring (2 wires instead of 3) but
  increases conversion time and requires a strong pull-up during temperature conversion.

  Limitations: the 750ms conversion time at 12-bit resolution means this is not
  suitable for rapid thermal transient measurement. For faster thermal response,
  consider analog thermistors or the TMP117 (which offers similar accuracy with
  I2C interface and faster reads).

  The -55C to +125C range covers most robotics applications but does not extend to
  deep space temperatures (-270C). For cryogenic monitoring, consider platinum RTDs
  (PT100/PT1000) or silicon diode sensors.

