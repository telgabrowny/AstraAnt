notes: |
  LoRa is the most promising COTS radio technology for swarm coordination in the
  AstraAnt context. The extreme sensitivity (-148 dBm) and low power consumption make
  it ideal for ant-to-ant and ant-to-base communication over kilometer-scale distances.

  In vacuum/space: radio propagation is actually better (no atmospheric absorption),
  but the module hardware is not vacuum-rated. The crystal oscillator, solder joints,
  and PCB substrate would need vacuum bake-out testing. For a sealed pressurized
  tunnel, this is fine as-is.

  Data rate tradeoff: at SF12/125kHz BW you get ~300 bps but 15+ km range. At
  SF7/500kHz BW you get ~21 kbps but range drops to ~2-3 km. For telemetry and
  commands, the low data rate is usually sufficient. For bulk data transfer
  (images, spectra), consider the nRF24L01 or a higher-bandwidth radio.

  Antenna is critical: a well-matched quarter-wave whip or helical antenna is required.
  Module without antenna is nearly useless. On an asteroid surface with no atmosphere,
  the antenna geometry may need adjustment (no ground plane interaction).

  Note: SX1276 is succeeded by SX1262 with improved performance and lower power.
  Consider upgrading for new designs.

