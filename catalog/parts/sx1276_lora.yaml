id: "sx1276_lora"
name: "Semtech SX1276 LoRa Transceiver Module"
category: "communication"
description: "Semtech SX1276 long-range low-power wireless transceiver using LoRa spread-spectrum modulation. Operates in sub-GHz ISM bands (137-1020 MHz, typically 433/868/915 MHz). Achieves 10+ km line-of-sight range at very low data rates. Also supports FSK/OOK modulation for higher bandwidth applications."

specs:
  mass_g: 5.0                            # Typical module (e.g., RFM95W or HopeRF)
  power_draw_mw: 120                     # TX at +17 dBm
  rx_power_mw: 33                        # Receive mode
  sleep_power_ua: 0.2                    # Sleep mode current
  tx_power_dbm: 17                       # Configurable up to +20 dBm (PA_BOOST)
  sensitivity_dbm: -148                  # At SF12, 125 kHz BW (LoRa mode)
  frequency_mhz: [137, 1020]            # Programmable range; common: 433, 868, 915
  modulation: ["LoRa", "FSK", "OOK"]
  lora_bandwidth_kbps: [0.3, 50]        # LoRa mode depending on SF and BW settings
  fsk_bandwidth_kbps: 300                # FSK mode maximum
  spreading_factor: [6, 12]              # SF6 to SF12; higher = longer range, lower rate
  range_km_los: 15                       # Line of sight at SF12; urban ~2-5 km
  interface: "SPI"
  supply_voltage_v: 3.3                  # 1.8-3.7V operating range
  module_dimensions_mm: [16, 16, 3]      # Typical RFM95W module

environmental:
  temp_min_c: -40
  temp_max_c: 85
  vacuum_compatible: false               # RF module packaging not vacuum-rated
  sealed_tunnel_compatible: true
  radiation_tolerance: "none"            # Consumer silicon
  mtbf_hours_vacuum: 300                 # Crystal oscillator may fail; not characterized
  mtbf_hours_sealed: 40000
  mtbf_hours_earth: 150000

