id: "rp2040"
name: "Raspberry Pi RP2040 Microcontroller"
category: "compute"
description: "Raspberry Pi dual-core ARM Cortex-M0+ microcontroller. 264 KB SRAM, flexible I/O via PIO state machines. Available as bare chip (QFN-56) or on the Raspberry Pi Pico board with 2 MB flash, USB, and regulators."

specs:
  mass_g: 1.0                            # Bare QFN-56 chip; Pico board ~5g
  power_draw_mw: 100                     # Typical at 133 MHz, both cores active
  cpu_cores: 2
  cpu_freq_mhz: 133
  architecture: "ARM Cortex-M0+"
  sram_kb: 264
  flash_mb: 0                            # No onboard flash; external QSPI required
  gpio_count: 30
  adc_channels: 4                        # 12-bit SAR ADC, 500 ksps
  pio_state_machines: 8                  # 2 PIO blocks x 4 state machines each
  interfaces: ["SPI", "I2C", "UART", "USB 1.1", "PWM"]
  supply_voltage_v: 3.3                  # Core voltage 1.1V (internal regulator)
  dormant_mode_ua: 180                   # Dormant mode current

environmental:
  temp_min_c: -20                        # Commercial grade
  temp_max_c: 85
  vacuum_compatible: false               # Consumer packaging, no outgassing characterization
  sealed_tunnel_compatible: true
  radiation_tolerance: "none"            # 40 nm process, no radiation hardening
  mtbf_hours_vacuum: 300                 # Not characterized for vacuum
  mtbf_hours_sealed: 40000
  mtbf_hours_earth: 200000              # Simple design, very reliable

