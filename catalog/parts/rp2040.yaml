notes: |
  The RP2040's PIO state machines are extremely useful for custom I/O protocols —
  bit-banging serial, driving LED strips, or emulating SPI/I2C peripherals in parallel.
  At $0.80 per chip it is essentially disposable. The Pico board (~$4) adds 2 MB flash,
  USB connector, and 3.3V regulator, and is a better starting point for prototyping.
  No wireless capability; pair with an SX1276 or nRF24L01 for comms.
  The -20C min temp is a limitation for deep space; extended temp versions not available.

