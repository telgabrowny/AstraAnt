id: "vl53l0x_lidar"
name: "STMicro VL53L0X Time-of-Flight Ranging Sensor"
category: "sensor"
description: "STMicroelectronics VL53L0X fully integrated miniature Time-of-Flight ranging and gesture detection sensor. Uses a 940 nm VCSEL (vertical-cavity surface-emitting laser) and SPAD (single-photon avalanche diode) array to measure distance up to 2 meters with millimeter resolution. I2C interface."

specs:
  mass_g: 1.0                            # Bare module; breakout board ~2g
  power_draw_mw: 20                      # Typical during ranging
  standby_power_ua: 5                    # Hardware standby
  range_max_m: 2.0                       # Absolute maximum; typical useful range ~1.2m
  range_min_mm: 30
  accuracy_mm: 3                         # At <1.2m in good conditions (typical +/- 3%)
  ranging_time_ms: 33                    # Default; configurable 20-200 ms
  field_of_view_deg: 25                  # Full cone angle
  laser_wavelength_nm: 940               # Class 1 VCSEL (eye-safe)
  interface: "I2C"
  i2c_address: "0x29"                    # Default; can be changed in software
  supply_voltage_v: 2.8                  # 2.6-3.5V operating range
  package_mm: [4.4, 2.4, 1.0]           # L x W x H (optical LGA-12)

environmental:
  temp_min_c: -20
  temp_max_c: 70
  vacuum_compatible: false               # VCSEL and SPAD not characterized for vacuum
  sealed_tunnel_compatible: true
  radiation_tolerance: "none"            # SPAD array is radiation-sensitive
  mtbf_hours_vacuum: 200                 # Unknown behavior; VCSEL may degrade
  mtbf_hours_sealed: 40000
  mtbf_hours_earth: 100000

