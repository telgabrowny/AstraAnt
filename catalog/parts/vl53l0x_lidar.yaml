notes: |
  The VL53L0X is the simplest way to get millimeter-resolution distance measurements
  in a tiny package. The 25-degree field of view means it measures a cone, not a point,
  so at 1m range you are averaging over a ~44cm diameter area. For tighter FOV, consider
  the VL53L1X (successor) which offers programmable ROI and up to 4m range.

  The sensor works by measuring photon time-of-flight from the VCSEL laser to the
  target and back. Ambient light rejection is good but performance degrades in direct
  sunlight. In a dark tunnel or on an asteroid surface (no atmosphere, no ambient IR),
  performance should be excellent for the sensor's rated range.

  Not vacuum-tested. The VCSEL may behave differently in vacuum (thermal dissipation
  changes). The cover glass adhesive may outgas. Use with caution in unsealed
  environments and conduct vacuum bake-out testing before relying on it.

