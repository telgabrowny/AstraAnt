notes: |
  CP1 is the gold standard for solar sail material. It was developed specifically for
  solar sailing by NASA Langley Research Center and is the most flight-proven sail
  material available. Key advantages over Kapton (standard polyimide):
  - Colorless/transparent (hence "CP1") allowing back-side thermal emission
  - Lower areal density (~7 g/m2 vs ~12 g/m2 for Kapton at similar thickness)
  - Better UV stability (no darkening/embrittlement over time)
  - Wider temperature range (-269C to +260C)

  Procurement is challenging: NeXolve (formerly ManTech SRS Technologies, now part of
  Huntsville operations) is essentially the sole manufacturer. They primarily serve
  NASA and DoD contracts. Small quantities for academic/commercial use may require
  6-12 month lead times and minimum order quantities. Pricing varies enormously
  with quantity — the $500-1000/m2 estimate is for small research quantities; large
  orders (100+ m2) may be $100-200/m2.

  For prototyping and ground testing, aluminized Mylar (~12 g/m2, ~$5/m2) is a
  reasonable stand-in. It is heavier and less thermally stable but orders of magnitude
  cheaper and readily available.

  For the AstraAnt solar sail, consider: at 7 g/m2, a 10 m2 sail masses only 70g.
  At 1 AU, this produces ~91 uN of thrust — tiny, but continuous and propellant-free.
  Sail area trades directly against transit time to target asteroids.

