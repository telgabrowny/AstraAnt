id: "cp1_polyimide_sail"
name: "CP1 Colorless Polyimide Solar Sail Material"
category: "sail"
description: "Colorless Polyimide (CP1) film developed by NASA Langley and manufactured by ManTech SRS Technologies (now NeXolve). The primary solar sail material used in NASA's NanoSail-D2 and NEA Scout missions. Extremely thin (~2.5 um), lightweight (~7 g/m2), and space-qualified with aluminum or chromium reflective coatings. Survives extreme temperature cycling and UV exposure."

specs:
  mass_g: 0.0                            # Per-area material; see areal_density
  power_draw_mw: 0                       # Passive material
  areal_density_g_per_m2: 7.0            # At ~2.5 um thickness with aluminum coating
  film_thickness_um: 2.5                 # Bare CP1 film
  coating_thickness_nm: 100              # Typical aluminum coating
  reflectivity: 0.90                     # With aluminum coating; 0.88-0.92 range
  absorptivity: 0.06                     # At aluminum-coated surface
  emissivity_front: 0.05                 # Aluminum-coated side
  emissivity_back: 0.55                  # Bare CP1 side
  tensile_strength_mpa: 120              # CP1 film
  elongation_at_break_percent: 12
  solar_pressure_force_n_per_m2: 0.0000091  # At 1 AU, perfectly reflective: 2*P = 9.08 uN/m2
  characteristic_acceleration_mm_per_s2: 1.3  # Typical for 7 g/m2 sail at 1 AU

environmental:
  temp_min_c: -269                       # Tested to liquid helium temperatures
  temp_max_c: 260                        # Short-term; long-term limit ~200C
  vacuum_compatible: true                # Space-qualified; extensively tested in vacuum
  sealed_tunnel_compatible: true
  radiation_tolerance: "high"            # Designed for space UV and particle exposure
  mtbf_hours_vacuum: 500000             # Space-qualified; degradation is gradual
  mtbf_hours_sealed: 500000
  mtbf_hours_earth: 100000              # Humidity can degrade adhesion of metallic coatings

