id: "ov7670_camera"
name: "OmniVision OV7670 Camera Module"
category: "sensor"
description: "OmniVision OV7670 VGA (640x480) CMOS image sensor module. Outputs raw Bayer, RGB565, RGB555, or YCbCr422 image data over an 8-bit parallel interface. Includes automatic exposure control, gain control, white balance, and color matrix. One of the cheapest camera sensors available, widely used in embedded vision projects."

specs:
  mass_g: 3.0                            # Module with lens holder; bare sensor ~0.5g
  power_draw_mw: 60                      # Active imaging
  standby_power_ua: 20                   # Standby mode
  resolution_pixels: [640, 480]          # VGA
  frame_rate_fps: 30                     # At VGA; up to 60 fps at QVGA (320x240)
  pixel_size_um: 3.6
  sensor_format: "1/6 inch"
  lens_focal_length_mm: 3.6              # Standard module lens
  field_of_view_deg: 25                  # With standard 3.6mm lens
  output_format: ["RAW Bayer", "RGB565", "RGB555", "YCbCr422"]
  interface: "8-bit parallel + SCCB (I2C-like)"
  supply_voltage_v: 3.3                  # Core 1.8V, I/O 2.5-3.0V
  dynamic_range_db: 52
  snr_db: 46
  module_dimensions_mm: [21, 21, 15]     # Typical module with lens

environmental:
  temp_min_c: -30
  temp_max_c: 70
  vacuum_compatible: false               # Plastic lens, adhesives, consumer packaging
  sealed_tunnel_compatible: true
  radiation_tolerance: "none"            # CMOS sensor susceptible to displacement damage
  mtbf_hours_vacuum: 100                 # Plastic lens may warp, adhesives outgas
  mtbf_hours_sealed: 30000
  mtbf_hours_earth: 100000

