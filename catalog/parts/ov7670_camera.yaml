notes: |
  The OV7670 is the cheapest path to machine vision for embedded systems. At VGA
  resolution it is adequate for obstacle detection, landmark recognition, and basic
  visual inspection. The 8-bit parallel interface requires many GPIO pins or a
  dedicated camera interface (DCMI on STM32, PIO on RP2040, or camera peripheral on
  ESP32-S3).

  Key limitations:
  - VGA resolution is very low by modern standards; fine detail is lost
  - No onboard JPEG compression; raw frames are ~600 KB each (RGB565)
  - The parallel interface is challenging to drive without hardware support
  - Module with FIFO buffer (AL422B) recommended for MCUs without camera DMA

  The OV7670 with FIFO buffer is recommended: the AL422B SRAM buffers a full frame,
  allowing the MCU to read at its own pace. Without FIFO, you must read pixels in
  real-time at the pixel clock rate, which requires DMA or PIO.

  For the AstraAnt, the ESP32-S3 has native camera interface support and can drive
  the OV7670 directly without a FIFO. The RP2040 can use PIO for camera capture.
  The STM32L4 has DCMI but the L476 does not — check the specific variant.

  For better image quality, consider the OV2640 (2MP, JPEG output, ~$5) or OV5640
  (5MP, autofocus, ~$15). These are drop-in upgrades with similar interfaces.

  Not vacuum compatible due to plastic lens assembly and adhesives. For space imaging,
  glass optics and conformal coating would be needed.

