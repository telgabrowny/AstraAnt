notes: |
  The BNO055's killer feature is the onboard sensor fusion — it outputs ready-to-use
  quaternions and Euler angles without requiring the host MCU to run Kalman filters or
  complementary filters. This saves significant CPU time and development effort compared
  to raw IMUs like the MPU-6050 or ICM-20948.

  Limitations: The magnetometer is sensitive to nearby ferrous materials and needs
  calibration (figure-8 motion). In space (no magnetic field reference), the
  magnetometer is useless and fusion degrades to 6-DOF (accel+gyro only). Gyroscope
  drift is ~0.5 deg/s; for long-duration orientation hold without magnetic reference,
  a star tracker or sun sensor is needed for absolute reference.

  The MEMS elements are consumer-grade and not characterized for vacuum or radiation.
  MEMS accelerometers have been flown on CubeSats with success, but the BNO055's
  onboard Cortex-M0 is more radiation-sensitive than the MEMS elements themselves.
  For space-grade IMUs, consider Honeywell HG4930 or Sensonor STIM300 (10-100x cost).

