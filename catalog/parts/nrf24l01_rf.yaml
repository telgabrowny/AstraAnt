notes: |
  The nRF24L01+ is the cheapest high-bandwidth short-range radio available. At <$1.50
  per module, it is essentially disposable. The 6-pipe multiceiver feature is useful for
  star-topology networks where a central coordinator talks to multiple ants.

  Compared to LoRa (SX1276): the nRF24L01 offers 40-60x higher data rates but 10-100x
  shorter range. Use LoRa for long-range telemetry and commands; use nRF24L01 for
  short-range bulk data transfer (images, spectral data, firmware updates).

  The 2.4 GHz band penetrates rock/regolith poorly (~1-10 cm depending on material).
  For through-rock communication in a mining tunnel, sub-GHz frequencies (LoRa) are
  significantly better. The nRF24L01 is best suited for line-of-sight swarm
  communication on the surface.

  The built-in auto-acknowledge and auto-retransmit features simplify protocol design
  considerably. However, there is no frequency hopping or spread spectrum — the 2.4 GHz
  ISM band is crowded on Earth but empty in space.

  For prototyping, the cheap Chinese modules work fine but have poor RF layout. For
  flight hardware, use the bare Nordic chip with a proper RF design or the PA+LNA
  variant for extended range.

