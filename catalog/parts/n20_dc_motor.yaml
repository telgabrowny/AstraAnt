notes: |
  The N20 gearmotor is the workhorse of small robotics. Pololu's "micro metal gearmotor"
  line is the best-characterized source, with consistent specifications and quality
  control. Generic Chinese N20 motors from Amazon/AliExpress are 50-70% of the cost
  but have wider spec variation and shorter lifespan.

  Absolutely not vacuum compatible: the brushed DC motor will arc in vacuum (Paschen's
  law minimum at ~1 Torr), and the gearbox grease will outgas within minutes. In a
  sealed pressurized tunnel, they are fine but brush wear limits lifetime to ~5000 hours.

  For precise positioning, add a magnetic encoder (Pololu offers matching encoder boards).
  Without feedback, these are open-loop speed/torque actuators only.

  For space/vacuum applications, replace with Maxon brushless motors (see
  vacuum_actuator_maxon). For higher-quality ground testing, consider Pololu's
  HP (high-power) or HPCB (high-power carbon brush) variants which have better
  specifications and longer brush life.

  Gear ratio selection guide:
  - 10:1 to 30:1: High speed, low torque (wheel drive)
  - 50:1 to 150:1: Balanced (general mechanisms)
  - 200:1 to 1000:1: High torque, low speed (grippers, lifters)

