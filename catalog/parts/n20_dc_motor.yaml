id: "n20_dc_motor"
name: "N20 Micro DC Gearmotor"
category: "motor"
description: "Generic N20-size micro DC gearmotor with metal gearbox. Available in a wide range of gear ratios (10:1 to 1000:1) and voltages (3V, 6V, 12V). The N20 form factor (12mm diameter x 10mm gearbox x 15-25mm motor body) is a de facto standard used in hobby robotics, small mechanisms, and prototyping. Brushed DC motor with spur or planetary gear reduction."

specs:
  mass_g: 12.0                           # Typical with gearbox; varies 10-15g by ratio
  power_draw_mw: 500                     # Typical under moderate load
  stall_current_ma: 800                  # At 6V; varies by winding
  no_load_current_ma: 50                 # At rated voltage
  supply_voltage_v: 6.0                  # Common 6V variant; 3V and 12V also available
  no_load_rpm: 300                       # With 100:1 gearbox at 6V (varies by ratio)
  stall_torque_kg_cm: 1.5               # With 100:1 gearbox at 6V
  gear_ratio: "10:1 to 1000:1"          # Wide range available
  gear_type: "metal spur"
  motor_type: "brushed DC"
  shaft_diameter_mm: 3.0                 # D-shaft, standard
  body_diameter_mm: 12.0
  body_length_mm: 25.0                   # Motor + gearbox (varies by ratio)
  encoder_optional: true                 # Magnetic encoder add-ons available

environmental:
  temp_min_c: -10                        # Grease viscosity limits cold operation
  temp_max_c: 50                         # Brush and grease thermal limits
  vacuum_compatible: false               # Brushed motor, standard grease, open gearbox
  sealed_tunnel_compatible: true         # Fine in pressurized environment
  radiation_tolerance: "none"
  mtbf_hours_vacuum: 100                 # Brushes arc, grease evaporates immediately
  mtbf_hours_sealed: 5000               # Brush wear is the limiting factor
  mtbf_hours_earth: 10000               # Hobby-grade; brush wear limits life

