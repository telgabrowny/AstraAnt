notes: |
  The AS7341 is the cheapest path to multi-spectral sensing. With 11 channels spanning
  violet to NIR, it can do basic mineral/material identification, distinguish between
  rock types, and detect certain compounds by their spectral signatures. This is not a
  spectrometer (no continuous spectrum), but the discrete channels can classify many
  materials of interest for asteroid mining.

  For asteroid surface analysis, the NIR channel at 910 nm is particularly useful for
  detecting hydrated minerals (water content). The flicker detection channel can be
  repurposed for rapid signal detection.

  The sensor requires an external light source for reflectance spectroscopy. The
  onboard LED driver can power a white LED for close-range measurements (<50mm).
  For longer range, pair with a focused light source.

  Multiplexing note: only 6 of the 11 channels can be read simultaneously due to the
  internal ADC architecture. Full 11-channel reads require two sequential measurements
  with different SMUX configurations. The Adafruit library handles this transparently.

