id: "as7341_spectral"
name: "AMS AS7341 11-Channel Spectral Sensor"
category: "sensor"
description: "ams-OSRAM AS7341 11-channel multi-spectral sensor covering visible to near-infrared (350-1000 nm). Eight channels in the visible range, one clear channel, one near-IR channel, and one flicker detection channel. Integrated LED driver for active illumination. I2C interface. Useful for material identification, colorimetry, and basic spectroscopy."

specs:
  mass_g: 1.0                            # On breakout board; bare chip negligible
  power_draw_mw: 15                      # Active sensing with LED off
  led_drive_power_mw: 100               # When integrated LED driver is active
  spectral_channels: 11
  channel_wavelengths_nm:                # Center wavelengths with ~40-60nm FWHM
    F1: 415                              # Violet
    F2: 445                              # Blue
    F3: 480                              # Cyan
    F4: 515                              # Green
    F5: 555                              # Yellow-Green
    F6: 590                              # Orange
    F7: 630                              # Red
    F8: 680                              # Deep Red
    clear: "broadband"
    nir: 910                             # Near-infrared
    flicker: "flicker detection"
  spectral_range_nm: [350, 1000]
  adc_resolution_bits: 16               # Per channel, with programmable gain
  integration_time_us: [2780, 712000]   # Configurable range
  gain_steps: [0.5, 512]                # 0.5x to 512x programmable gain
  interface: "I2C"
  i2c_address: "0x39"
  supply_voltage_v: 1.8                  # 1.71-2.0V (I2C is 3.3V tolerant)
  package_mm: [3.1, 2.0, 1.0]           # LGA-8

environmental:
  temp_min_c: -30
  temp_max_c: 85
  vacuum_compatible: false               # Not characterized; optical filter adhesives may outgas
  sealed_tunnel_compatible: true
  radiation_tolerance: "none"            # Photodiode array sensitive to displacement damage
  mtbf_hours_vacuum: 200                 # Filter stack adhesives may degrade
  mtbf_hours_sealed: 40000
  mtbf_hours_earth: 100000

