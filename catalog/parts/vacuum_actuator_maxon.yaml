notes: |
  Maxon motors are the de facto standard for space mechanisms. The EC-max 22 vacuum
  configuration uses ceramic bearings (no outgassing steel lubricant), Braycote 601EF
  or equivalent vacuum grease, and adhesives selected for low outgassing per
  ASTM E595 (TML <1%, CVCM <0.1%). The standard catalog motor is NOT vacuum rated —
  you must order the vacuum-compatible configuration directly from Maxon, which adds
  $50-100 to the price and 4-8 weeks lead time. Pair with the GP 22 planetary gearhead
  for high-torque low-speed applications. For position control, add the ENX 16 EASY
  encoder. The motor electronics (driver board) are a separate concern and must also
  be vacuum-rated or located in a sealed electronics enclosure. Total actuator mass
  with gearhead and encoder is typically 55-70g. This is 20-40x the cost of an SG90
  but the only responsible choice for vacuum or space applications.

