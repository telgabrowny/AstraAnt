id: "vacuum_actuator_maxon"
name: "Maxon EC-max 22 Brushless DC Motor (Vacuum-Rated)"
category: "actuator"
description: "Maxon EC-max 22 electronically commutated brushless DC motor in vacuum-compatible configuration. Ceramic bearings, vacuum-rated lubricant, no outgassing adhesives. Representative of space-rated BLDC actuators used in satellite mechanisms, antenna positioners, and robotic joints."

specs:
  mass_g: 35.0                           # Motor body only; with gearhead ~55-70g
  power_draw_mw: 800                     # Nominal continuous; max ~6W
  nominal_voltage_v: 12.0
  nominal_torque_mn_m: 9.75              # Millinewton-meters continuous
  stall_torque_mn_m: 83.0
  no_load_speed_rpm: 10800
  nominal_speed_rpm: 8560
  efficiency_percent: 79
  motor_diameter_mm: 22.0
  motor_length_mm: 32.5
  bearing_type: "ceramic ball bearings"
  commutation: "electronic (brushless)"
  encoder_optional: true                 # Incremental encoder available as add-on
  gearhead_optional: true                # GP 22 planetary gearhead available

environmental:
  temp_min_c: -55                        # Vacuum lubricant rated range
  temp_max_c: 100                        # Continuous; intermittent to 125C
  vacuum_compatible: true                # Specifically configured for vacuum operation
  sealed_tunnel_compatible: true
  radiation_tolerance: "low"             # Electronics are COTS; magnets are tolerant
  mtbf_hours_vacuum: 50000              # Ceramic bearings + vacuum lubricant designed for this
  mtbf_hours_sealed: 60000
  mtbf_hours_earth: 80000

