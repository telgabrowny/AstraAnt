    - name: "Mouser"
      url: "https://www.mouser.com/ProductDetail/Espressif-Systems/ESP32-S3-WROOM-1-N8R2"
      part_number: "356-ESP32S3WRM1N8R2"
      price_usd: 3.90
      date_checked: "2026-03-26"
  price_history:
    - date: "2026-03-26"
      price_usd: 3.90
      source: "DigiKey"

notes: |
  The ESP32-S3 is overkill for simple I/O tasks but excellent as a wireless hub or
  edge-ML node. WiFi and BLE are useful for ground testing but irrelevant in space.
  Not vacuum compatible due to consumer-grade packaging — use only in sealed pressurized
  environments. The vector instructions make it attractive for lightweight onboard inference.
  Consider the ESP32-S3-DevKitC-1 (~$10) for prototyping before committing to bare modules.

