id: "esp32_s3"
name: "ESP32-S3-WROOM-1 Module"
category: "compute"
description: "Espressif ESP32-S3 dual-core Xtensa LX7 wireless MCU module with WiFi 802.11 b/g/n and Bluetooth 5 LE. Includes 512 KB SRAM, 384 KB ROM, and support for external PSRAM/flash. AI acceleration instructions for edge ML inference."

specs:
  mass_g: 10.0
  power_draw_mw: 250
  cpu_cores: 2
  cpu_freq_mhz: 240
  architecture: "Xtensa LX7"
  sram_kb: 512
  rom_kb: 384
  flash_mb: 8                            # Typical module configuration (up to 16 MB)
  psram_mb: 2                            # Optional, OPI PSRAM supported up to 8 MB
  gpio_count: 36
  adc_channels: 20                       # Two 12-bit SAR ADCs
  interfaces: ["SPI", "I2C", "I2S", "UART", "USB-OTG", "SDIO", "TWAI", "LCD", "Camera"]
  wireless: ["WiFi 802.11b/g/n", "Bluetooth 5 LE"]
  supply_voltage_v: 3.3
  deep_sleep_ua: 7                       # Deep sleep current in microamps

environmental:
  temp_min_c: -40
  temp_max_c: 85
  vacuum_compatible: false               # Consumer-grade packaging, electrolytic caps may bulge
  sealed_tunnel_compatible: true         # Fine in low-pressure sealed environments
  radiation_tolerance: "none"            # No radiation hardening; consumer silicon
  mtbf_hours_vacuum: 200                 # Packaging not designed for vacuum, rapid degradation
  mtbf_hours_sealed: 30000              # Reliable in sealed low-pressure tunnel
  mtbf_hours_earth: 100000              # Standard consumer electronics reliability

sourcing:
  suppliers:
