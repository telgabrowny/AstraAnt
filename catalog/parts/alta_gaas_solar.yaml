notes: |
  Alta Devices cells are the highest-efficiency single-junction solar cells commercially
  available. The epitaxial liftoff manufacturing process produces cells only ~2 um thick
  that can be mounted on flexible substrates, making them ideal for solar sail integration
  or conformal mounting on spacecraft surfaces. At ~85 W/kg specific power, they are
  roughly 10x better than rigid silicon panels on a mass basis.

  Procurement note: Alta Devices was acquired by Hanergy and availability has been
  inconsistent. Lead times may be 8-16 weeks. For prototyping, SunPower IBC cells
  (~24% efficiency, ~$10/cell) are a more accessible alternative at 3-4x the mass
  penalty. For CubeSat use, SpectroLab also offers GaAs triple-junction cells at
  ~30% efficiency but higher cost ($200+/cell) and are more rigid.

  Temperature coefficient is approximately -0.1%/C, much better than silicon (-0.4%/C),
  which is advantageous at elevated temperatures near the Sun. GaAs is also inherently
  more radiation-tolerant than silicon, degrading ~1.5%/year in LEO vs ~3%/year for Si.

