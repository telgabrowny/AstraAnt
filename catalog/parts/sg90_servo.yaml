notes: |
  The SG90 is the cheapest path to mechanical motion for prototyping. Plastic gears
  limit durability and precision; expect gear slop of 2-3 degrees. No position feedback
  (open loop). In vacuum, the grease will outgas within hours and the plastic gears will
  become brittle below -40C, leading to catastrophic gear failure. In a sealed
  pressurized tunnel at moderate temperatures, these are surprisingly long-lived.
  For space applications, replace with vacuum-rated brushless actuators (see
  vacuum_actuator_maxon). Metal-gear variants (MG90S) are marginally better but
  still not vacuum compatible. Use SG90 for ground testing and concept validation only.

