safety:
  hazard_class: "Corrosive"
  handling_notes: >
    Strongly alkaline. Dissolving pellets in water is exothermic. Causes
    severe chemical burns on skin and eye contact. Hygroscopic — absorbs
    moisture and CO2 from air, degrading to Na2CO3 over time if not sealed.
    Store in airtight HDPE containers. PPE: chemical-resistant gloves, face
    shield, splash goggles. In the precipitation workflow, NaOH solution is
    added to copper-depleted PLS to raise pH to 7.5-8.1, selectively
    precipitating nickel as Ni(OH)2 and cobalt as Co(OH)2.

