safety:
  hazard_class: "Extremely Toxic"
  handling_notes: >
    HIGHLY TOXIC — lethal dose for humans is 1-3 mg/kg body weight.
    Generates hydrogen cyanide (HCN) gas if contacted with acid (pH < 10.5).
    ALL handling requires: full-face respirator with cyanide cartridge,
    chemical-resistant gloves (nitrile + neoprene), full body coverage, and
    buddy system with cyanide antidote kit (hydroxocobalamin or amyl nitrite)
    immediately accessible. Storage: locked, ventilated cabinet, segregated
    from all acids. Solutions must be maintained at pH > 11 at all times to
    prevent HCN gas evolution. Spent solutions require alkaline chlorination
    (NaOCl at pH > 11) to destroy cyanide before disposal. Restricted
    purchase — may require end-use declaration and hazmat shipping.
    For space deployment this is the backup option ONLY if biogenic cyanide
    from C. violaceum proves insufficient. The sealed bioreactor must have
    HCN gas monitoring and emergency scrubbing capability.

