safety:
  hazard_class: "Corrosive"
  handling_notes: >
    Quicklime reacts exothermically with water, generating significant heat.
    Produces calcium hydroxide (slaked lime) on hydration. Fine powder is a
    respiratory irritant. Store in sealed, moisture-proof containers. PPE:
    dust mask, chemical splash goggles, gloves. In the precipitation
    workflow, CaO is added gradually to pregnant leach solution (PLS) to
    raise pH to 5.3, precipitating copper as Cu(OH)2. Also useful as a
    general pH-raising agent for bioreactor neutralization steps.

