safety:
  hazard_class: "Corrosive"
  handling_notes: >
    Concentrated H2SO4 is severely corrosive and causes exothermic reaction
    with water. Always add acid to water, never water to acid. Requires
    acid-resistant containment (HDPE, PTFE, or glass). PPE: acid-resistant
    gloves, face shield, chemical splash goggles. In space deployment,
    concentrated acid must be stored in sealed PTFE-lined containers with
    secondary containment. Spill kit and neutralizing agent (sodium
    bicarbonate) must be accessible.

