id: "sulfuric_acid"
name: "Sulfuric Acid"
formula: "H2SO4"
category: "acid"

specs:
  density_g_per_ml: 1.84         # Concentrated (98%)
  concentration: "98% concentrated; diluted to 1-5% for pH adjustment"
  consumption_rate: "Small amounts for pH control in bioreactor water recovery and Track A acid maintenance; ~1-5 mL/L per pH adjustment cycle"

sourcing:
  suppliers:
